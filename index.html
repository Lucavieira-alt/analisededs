<!doctype html>
<html lang="pt-BR" class="bg-bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monitoramento — Last Mile</title>
  <meta name="description" content="Dashboard de monitoramento de rotas last mile (Evolução SVC, Ranking MLP, Rotas, Crítico, KPIs, Ambulâncias, NEX, DIT D0, Rotas Não Finalizadas e Resumo Operacional) a partir do Google Sheets publicado." />
  <meta name="theme-color" content="#ffe600" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #f4f4f5;
      --card: #ffffff;
      --border: #e4e4e7;
      --fg: #18181b;
      --muted: #71717a;
      --secondary: #f4f4f5;
      --brand-yellow: #ffe600;
      --brand-blue: #3483fa;
      --success: #00a650;
      --success-bg: rgba(0,166,80,.12);
      --warning: #b45309;
      --warning-bg: rgba(245,158,11,.15);
      --danger: #e11900;
      --danger-bg: rgba(225,25,0,.10);
      --danger-bg-strong: rgba(225,25,0,.15);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .num { font-variant-numeric: tabular-nums; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    /* Header */
    header { position: sticky; top: 0; z-index: 30; background: rgba(255,255,255,.95); backdrop-filter: blur(6px); border-bottom: 1px solid var(--border); }
    .ystrip { height: 4px; width: 100%; background: var(--brand-yellow); }
    .hwrap { max-width: 1600px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; padding: 12px 24px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo { height: 46px; width: auto; display: flex; align-items: center; justify-content: center; }
    .logo img { height: 46px; width: auto; display: block; }
    h1 { font-size: 18px; font-weight: 600; margin: 0; }
    .sub { font-size: 12px; color: var(--muted); margin: 0; }
    .hmeta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .pill { display: inline-flex; align-items: center; gap: 6px; border: 1px solid; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 500; }
    .pill.live { border-color: rgba(0,166,80,.4); background: var(--success-bg); color: var(--success); }
    .pill.demo { border-color: rgba(245,158,11,.4); background: var(--warning-bg); color: var(--warning); }
    .dot { width: 7px; height: 7px; border-radius: 999px; background: currentColor; }
    .box { display: flex; flex-direction: column; align-items: flex-end; border: 1px solid var(--border); border-radius: var(--radius); padding: 3px 12px; background: var(--bg); }
    .box .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .box .val { font-family: ui-monospace, monospace; font-size: 14px; font-weight: 600; }
    button.btn { display: inline-flex; align-items: center; gap: 8px; border: 0; border-radius: 8px; background: var(--brand-blue); color: #fff; font-weight: 600; font-size: 13px; padding: 8px 14px; cursor: pointer; }
    button.btn:disabled { opacity: .6; cursor: default; }
    /* layout */
    main { max-width: 1600px; margin: 0 auto; padding: 20px 24px 64px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 4px; background: var(--secondary); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
    .tab { display: inline-flex; align-items: center; gap: 6px; border: 0; background: transparent; color: var(--muted); font-weight: 600; font-size: 13px; padding: 7px 14px; border-radius: 7px; cursor: pointer; }
    .tab[aria-selected="true"] { background: var(--card); color: var(--fg); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .card.pad { padding: 18px; }
    .card-h { padding: 16px 18px; border-bottom: 1px solid var(--border); }
    .card-t { font-size: 15px; font-weight: 600; margin: 0; }
    .card-d { font-size: 12px; color: var(--muted); margin: 2px 0 0; }
    .stack { display: flex; flex-direction: column; gap: 20px; }
    .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .grow { flex: 1; }
    label.f { display: flex; flex-direction: column; gap: 4px; }
    label.f .flbl { font-size: 12px; font-weight: 500; color: var(--muted); }
    select, input[type="text"] { height: 34px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--fg); padding: 0 10px; font-size: 13px; min-width: 150px; }
    input[type="text"] { min-width: 220px; }
    /* table */
    .tscroll { max-height: 640px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { position: sticky; top: 0; background: var(--card); z-index: 5; text-align: left; font-weight: 600; color: var(--muted); font-size: 12px; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th.r, td.r { text-align: right; }
    tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr:hover { background: rgba(0,0,0,.015); }
    .muted { color: var(--muted); }
    .small { font-size: 11px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; border: 1px solid; border-radius: 7px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
    .b-good { color: var(--success); background: var(--success-bg); border-color: rgba(0,166,80,.3); }
    .b-warn { color: var(--warning); background: var(--warning-bg); border-color: rgba(245,158,11,.4); }
    .b-bad { color: var(--danger); background: var(--danger-bg-strong); border-color: rgba(225,25,0,.3); }
    .t-bad { color: var(--danger); font-weight: 600; }
    .t-warn { color: var(--warning); font-weight: 600; }
    .t-good { color: var(--success); font-weight: 600; }
    /* summary cards */
    .kgrid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
    @media (min-width: 768px){ .kgrid { grid-template-columns: repeat(4,1fr);} }
    @media (min-width: 1200px){ .kgrid { grid-template-columns: repeat(8,1fr);} }
    .kc { border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: var(--card); display: flex; flex-direction: column; gap: 4px; }
    .kc .kl { font-size: 11px; color: var(--muted); font-weight: 500; }
    .kc .kv { font-size: 22px; font-weight: 700; }
    .kc .kh { font-size: 11px; color: var(--muted); }
    .kv.success { color: var(--success);} .kv.danger { color: var(--danger);} .kv.warning { color: var(--warning);} .kv.brand { color: var(--brand-blue); }
    /* motivo grid */
    .mgrid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
    @media (min-width: 768px){ .mgrid { grid-template-columns: repeat(3,1fr);} }
    @media (min-width: 1200px){ .mgrid { grid-template-columns: repeat(6,1fr);} }
    /* bars */
    .barline { display: flex; flex-direction: column; gap: 5px; }
    .barhead { display: flex; justify-content: space-between; font-size: 12px; }
    .bartrack { height: 9px; border-radius: 999px; background: var(--secondary); overflow: hidden; }
    .barfill { height: 100%; border-radius: 999px; background: var(--danger); }
    .barfill.blue { background: var(--brand-blue); }
    .hbar-row { display: grid; grid-template-columns: 150px 1fr 48px; align-items: center; gap: 10px; padding: 4px 0; }
    .hbar-track { height: 20px; background: var(--secondary); border-radius: 6px; overflow: hidden; }
    .hbar-fill { height: 100%; border-radius: 6px; }
    .danger-card { border-color: rgba(225,25,0,.3); background: var(--danger-bg); }
    .offender { display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    @media (min-width:640px){ .offender { flex-direction: row; align-items: center; gap: 16px; } }
    .rank { width: 20px; height: 20px; border-radius: 6px; background: var(--secondary); color: var(--muted); font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
    .loading, .errbox { padding: 40px; text-align: center; color: var(--muted); }
    .errbox { color: var(--danger); }
    .twocol { display: grid; gap: 20px; }
    @media (min-width: 1024px){ .twocol { grid-template-columns: 3fr 2fr; } }
    .mlpgrid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width:640px){ .mlpgrid { grid-template-columns: repeat(2,1fr);} }
    @media (min-width:1024px){ .mlpgrid { grid-template-columns: repeat(3,1fr);} }
    .metric { border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
    .metric .ml { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing:.03em; }
    .metric .mv { font-size: 15px; font-weight: 700; }
    .hidden { display: none !important; }
    /* SVC tab */
    .svcgrid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
    @media (min-width:768px){ .svcgrid { grid-template-columns: repeat(3,1fr);} }
    @media (min-width:1024px){ .svcgrid { grid-template-columns: repeat(5,1fr);} }
    .svccard { cursor: pointer; gap: 8px; padding: 14px; display: flex; flex-direction: column; transition: box-shadow .15s, border-color .15s; }
    .svccard:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .svccard.active { box-shadow: 0 0 0 2px var(--brand-blue); border-color: var(--brand-blue); }
    .chartcols { display: grid; gap: 20px; }
    @media (min-width:1024px){ .chartcols { grid-template-columns: repeat(2,1fr);} }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--fg); }
    th.sortable.active { color: var(--fg); }
    .sortarrow { font-size: 10px; opacity: .6; }
    tr.active-row > td { background: var(--secondary); }
    .subtabs { display: inline-flex; gap: 4px; background: var(--secondary); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
    .subtab { border: 0; background: transparent; color: var(--muted); font-weight: 600; font-size: 13px; padding: 6px 14px; border-radius: 7px; cursor: pointer; }
    .subtab[aria-selected="true"] { background: var(--bg); color: var(--fg); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    .bigstat { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 20px; text-align: center; }
    .bigstat .bl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .bigstat .bv { font-size: 34px; font-weight: 800; line-height: 1; }
    .drill-row { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; border: 0; background: transparent; cursor: pointer; padding: 11px 16px; font: inherit; color: var(--fg); border-top: 1px solid var(--border); }
    .drill-row:hover { background: var(--secondary); }
    .drill-route { background: rgba(0,0,0,.015); padding-left: 30px; }
    .drill-caret { width: 14px; transition: transform .15s; color: var(--muted); }
    .drill-caret.open { transform: rotate(90deg); }
    .stack-bar { display: flex; height: 10px; width: 100%; overflow: hidden; border-radius: 999px; background: var(--secondary); }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: 4px; }
    .legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }
    .grp2 { display: grid; grid-template-columns: 60px 1fr; gap: 4px 10px; align-items: center; padding: 5px 0; }
    .grp2 .lbl2 { font-weight: 600; font-size: 12px; }
    .twin { display: flex; flex-direction: column; gap: 4px; }
    .twin .bartrack { height: 7px; }
  </style>
</head>
<body>
  <header>
    <div class="ystrip" aria-hidden="true"></div>
    <div class="hwrap">
      <div class="brand">
        <div class="logo"><img src="https://thesvg.org/icons/mercado-libre/default.svg" alt="Mercado Livre" width="66" height="46" /></div>
        <div>
          <h1>Monitoramento - Last Mile</h1>
          <p class="sub">SMG1 · SMG3 · SMG5 · SMG8 · SMG14 — operação do dia</p>
        </div>
      </div>
      <div class="hmeta">
        <span id="sourcePill" class="pill live"><span class="dot"></span> Google Sheets · Ao vivo</span>
        <div class="box"><span class="lbl">Atualizado</span><span id="updatedAt" class="val">--:--:--</span></div>
        <button id="refreshBtn" class="btn" type="button">Atualizar</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs" role="tablist">
      <button class="tab" role="tab" aria-selected="true" data-tab="svc">Evolução SVC</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="mlp">Ranking MLP</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="rotas">Rotas</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="critico">Crítico</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="kpis">KPIs</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="ambulancias">Ambulâncias</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="nex">Monitoramento NEX</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="dit">DIT D0</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="nao-finalizadas">Rotas Não Finalizadas</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="resumo">Resumo Operacional</button>
    </div>

    <div id="status" class="loading">Carregando dados do Google Sheets…</div>

    <section id="tab-svc" class="tabpanel hidden"></section>
    <section id="tab-mlp" class="tabpanel hidden"></section>
    <section id="tab-rotas" class="tabpanel hidden"></section>
    <section id="tab-critico" class="tabpanel hidden"></section>
    <section id="tab-kpis" class="tabpanel hidden"></section>
    <section id="tab-ambulancias" class="tabpanel hidden"></section>
    <section id="tab-nex" class="tabpanel hidden"></section>
    <section id="tab-dit" class="tabpanel hidden"></section>
    <section id="tab-nao-finalizadas" class="tabpanel hidden"></section>
    <section id="tab-resumo" class="tabpanel hidden"></section>
  </main>

  <script>
  "use strict";

  // ===================== CONFIG =====================
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQpWd81REdtFrDgavtyCd8yATpFIyzAvGuXHLdEsYzMpDgPUMdSeMVLfVIHyzv8znxdpmUikFX9Wj7e/pub?gid=0&single=true&output=csv";
  // Base de DIT D0: mesma planilha, aba diferente (cada linha é um SHIPMENT).
  const DIT_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQpWd81REdtFrDgavtyCd8yATpFIyzAvGuXHLdEsYzMpDgPUMdSeMVLfVIHyzv8znxdpmUikFX9Wj7e/pub?gid=574990527&single=true&output=csv";
  const FACILITIES = ["SMG1", "SMG3", "SMG5", "SMG8", "SMG14"];
  const META_DS = 98.5;
  const STEAM_OUT_LIMIT_MIN = 60;
  const INATIVIDADE_LIMIT_MIN = 30;
  const INATIVIDADE_CRITICA_MIN = 60;
  const DPPH_CRITICO = 10;
  const FALHAS_CRITICA_PCT = 5;
  const REFRESH_MS = 30 * 60 * 1000;

  const FAILURE_REASONS = {
    badAddress: "Endereço incorreto",
    buyerAbsent: "Comprador ausente",
    buyerRejected: "Recusado pelo comprador",
    inaccessibleAddress: "Endereço inacessível",
    businessClosed: "Estabelecimento fechado",
    buyerMoved: "Comprador mudou-se",
    lostOnRoute: "Extraviado na rota",
    missrouted: "Roteirização incorreta",
    damaged: "Avariado",
    unvisitedAddress: "Endereço não visitado",
  };
  const FAILURE_KEYS = Object.keys(FAILURE_REASONS);
  const FAILURE_COLUMN_MAP = {
    badAddress: ["SHIPMENTS.NOT_DELIVERED_DETAIL.BAD_ADDRESS","NOT_DELIVERED_DETAIL.BAD_ADDRESS","BAD_ADDRESS","WRONG_ADDRESS"],
    buyerAbsent: ["SHIPMENTS.NOT_DELIVERED_DETAIL.BUYER_ABSENT","NOT_DELIVERED_DETAIL.BUYER_ABSENT","BUYER_ABSENT","ABSENT"],
    buyerRejected: ["SHIPMENTS.NOT_DELIVERED_DETAIL.BUYER_REJECTED","NOT_DELIVERED_DETAIL.BUYER_REJECTED","BUYER_REJECTED","REJECTED"],
    inaccessibleAddress: ["SHIPMENTS.NOT_DELIVERED_DETAIL.INACCESSIBLE_ADDRESS","NOT_DELIVERED_DETAIL.INACCESSIBLE_ADDRESS","INACCESSIBLE_ADDRESS","INACCESSIBLE"],
    businessClosed: ["SHIPMENTS.NOT_DELIVERED_DETAIL.BUSINESS_CLOSED","NOT_DELIVERED_DETAIL.BUSINESS_CLOSED","BUSINESS_CLOSED","CLOSED"],
    buyerMoved: ["SHIPMENTS.NOT_DELIVERED_DETAIL.BUYER_MOVED","NOT_DELIVERED_DETAIL.BUYER_MOVED","BUYER_MOVED","MOVED"],
    lostOnRoute: ["SHIPMENTS.NOT_DELIVERED_DETAIL.LOST_ON_ROUTE","NOT_DELIVERED_DETAIL.LOST_ON_ROUTE","NOT_DELIVERED_DETAIL.LOST","LOST_ON_ROUTE","LOST"],
    missrouted: ["SHIPMENTS.NOT_DELIVERED_DETAIL.MISSROUTED","NOT_DELIVERED_DETAIL.MISSROUTED","MISSROUTED","MISROUTED"],
    damaged: ["SHIPMENTS.NOT_DELIVERED_DETAIL.DAMAGED","NOT_DELIVERED_DETAIL.DAMAGED","DAMAGED","DAMAGE"],
    unvisitedAddress: ["SHIPMENTS.NOT_DELIVERED_DETAIL.UNVISITED_ADDRESS","NOT_DELIVERED_DETAIL.UNVISITED_ADDRESS","NOT_DELIVERED_DETAIL.UNVISITED","UNVISITED_ADDRESS","UNVISITED"],
  };
  const VEHICLE_TYPES = ["Moto","Veículo de Passeio","Utilitário","Van","VUC","Caminhão","A pé","Outros"];
  const STATUS_LABELS = { EM_ROTA: "Em rota", FINALIZADA: "Finalizada", NAO_INICIADA: "Não iniciada" };
  const ENTREGUE_SUB = new Set(["Entregue", "Entregue Place"]);
  const DIT_CLASSES = ["Risco DIT", "Pendente", "Sem Risco DIT"];
  // Pacotes "reversíveis": em Risco DIT com motivo que permite reentrega.
  const DIT_REVERSIVEIS = new Set(["Cliente Ausente", "Comercial Fechado", "Endereço não visitado"]);
  const ROUTE_STATUS_LABEL = { active: "Em rota", close: "Fechada", return_to_station: "Retorno ao SVC" };
  // Cores dos gráficos (iguais ao app React).
  const C_RISCO = "var(--danger)", C_PENDENTE = "#f59e0b", C_SEMRISCO = "#10b981";

  // ===================== HELPERS =====================
  const ALL = "todos";
  const fmtInt = (n) => new Intl.NumberFormat("pt-BR").format(Math.round(n || 0));
  const fmtPct = (n, d=1) => `${(n||0).toLocaleString("pt-BR",{minimumFractionDigits:d,maximumFractionDigits:d})}%`;
  const fmtDec = (n, d=1) => (n||0).toLocaleString("pt-BR",{minimumFractionDigits:d,maximumFractionDigits:d});
  const round1 = (n) => Math.round(n*10)/10;
  const pad2 = (n) => String(n).padStart(2,"0");
  function fmtMinHHMM(min){ if(!Number.isFinite(min)||min<0) return "—"; return `${pad2(Math.floor(min/60))}:${pad2(Math.round(min%60))}`; }
  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  function norm(s){ return String(s).toUpperCase().replace(/[^A-Z0-9]/g,""); }
  function num(v){
    if(v==null||v==="") return 0;
    let s=String(v).trim().replace(/%/g,"");
    if(s.includes(",")&&s.includes(".")) s=s.replace(/\./g,"").replace(",",".");
    else if(s.includes(",")) s=s.replace(",",".");
    const n=Number(s); return Number.isFinite(n)?n:0;
  }
  function parseHHMM(v){ if(!v) return null; const m=String(v).match(/(\d{1,2}):(\d{2})/); return m?`${pad2(Number(m[1]))}:${m[2]}`:null; }
  function secondsToHHMM(t){ if(!Number.isFinite(t)||t<=0) return "00:00"; return `${pad2(Math.floor(t/3600))}:${pad2(Math.floor((t%3600)/60))}`; }
  function parseTsMs(v){
    if(!v) return 0;
    const m=String(v).match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?/);
    if(!m) return 0;
    const ts=new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5],+(m[6]||0)).getTime();
    return Number.isFinite(ts)?ts:0;
  }
  function clampPct(n){ return Math.max(0,Math.min(100,n)); }
  function hhmmToMin(v){ if(!v) return null; const m=String(v).match(/(\d{1,2}):(\d{2})/); return m?Number(m[1])*60+Number(m[2]):null; }
  function steamOutMin(ini, fim){ const a=hhmmToMin(ini), b=hhmmToMin(fim); if(a==null||b==null) return null; let d=b-a; if(d<0) d+=1440; return d; }
  function normalizeModal(raw){
    const v=(raw==null?"":String(raw)).trim();
    if(!v||v==="—") return "—";
    const s=v.toLowerCase();
    if(s.includes("moto")) return "Moto";
    if(s.includes("walker")||s.includes("a pé")||s.includes("a pe")) return "A pé";
    if(s.includes("passeio")) return "Veículo de Passeio";
    if(s.includes("vuc")) return "VUC";
    if(s.includes("van")) return "Van";
    if(s.includes("utilitár")||s.includes("utilitar")) return "Utilitário";
    if(s.includes("caminh")) return "Caminhão";
    return "Outros";
  }
  function normalizeKeys(row){ const out={}; for(const k in row){ out[norm(k)] = row[k]==null?"":String(row[k]); } return out; }
  function pick(row, aliases){ for(const a of aliases){ const k=norm(a); if(k in row) return row[k]; } return undefined; }

  // Flag NEX/DC a partir do XPT de destino.
  function resolveNexFlag(xpt){ const c=(xpt||"").toUpperCase(); if(c.includes("BRNMG")) return "BRNMG NEX"; if(c.includes("BRDMG")) return "BRDMG DC"; return null; }
  // Atribuição de MLP: BRDMG → Kangu; BRNMG + Passeio/Moto → ME Extra NEX; senão carrier.
  function resolveMlp(xpt, vehicleType, fallback){
    const c=(xpt||"").toUpperCase();
    if(c.includes("BRDMG")) return "Agências Kangu";
    if(c.includes("BRNMG") && /passeio|moto/i.test(vehicleType||"")) return "ME Extra NEX";
    return fallback || "—";
  }
  // Rota não finalizada de dia anterior: começou antes de hoje e sem CLOSE_DATE.
  function isRotaNaoFinalizada(r, now){
    if(!r.initialDateMs) return false;
    if(r.closeDateMs!=null) return false;
    const d0=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
    return r.initialDateMs<d0;
  }

  function mapFailures(row){
    const out={}; for(const key of FAILURE_KEYS){ out[key]=num(pick(row, FAILURE_COLUMN_MAP[key])); } return out;
  }

  function mapRow(row){
    const facilityId = pick(row, ["FACILITY.ID","FACILITY_ID","FACILITY"]);
    if(!facilityId || !FACILITIES.includes(facilityId)) return null;

    const dispatched = num(pick(row, ["SHIPMENTS.DISPATCHED","DISPATCHED"]));
    const received = num(pick(row, ["SHIPMENTS.RECEIVED","RECEIVED"]));
    const transferred = num(pick(row, ["SHIPMENTS.TRANSFERRED","TRANSFERRED"]));
    const delivered = num(pick(row, ["SHIPMENTS.DELIVERED","DELIVERED"]));
    const notDelivered = num(pick(row, ["SHIPMENTS.NOT_DELIVERED","NOT_DELIVERED"]));
    const firstDayDelivered = num(pick(row, ["SHIPMENTS.FIRST_DAY_DELIVERED","FIRST_DAY_DELIVERED"]));

    const totalCarregado = dispatched + received - transferred;
    const denom = Math.max(totalCarregado, 1);
    const evolucaoRota = ((delivered + notDelivered)/denom)*100;
    const falhasMomento = (notDelivered/denom)*100;
    const dsMomento = 100 - falhasMomento;

    const onZoneSeconds = num(pick(row, ["METRICS.ON_ZONE_HOURS","ON_ZONE_HOURS"]));
    const orhHoras = onZoneSeconds/3600;
    const orhHHMM = secondsToHHMM(onZoneSeconds);
    const dpph = orhHoras>0 ? delivered/orhHoras : 0;

    let status = "EM_ROTA";
    if(evolucaoRota <= 0.5) status = "NAO_INICIADA";
    else if(evolucaoRota >= 99.5) status = "FINALIZADA";

    const tsCol = pick(row, ["AUD_UPD_DTTM","AUD_INS_DTTM","LAST_UPDATED","ULTIMA_ATUALIZACAO"]);

    const cycle = (pick(row, ["cycle","CYCLE_RTG","CICLO","CYCLE"]) || "").trim() || "—";
    const tipoRota = (pick(row, ["TIPO_ROTA","ROUTE_TYPE","ROUTE.TYPE","TIPO"]) || "").trim() || "—";
    const isAmbulancia = /ambul[âa]ncia/i.test(tipoRota);
    const vehicleType = normalizeModal(pick(row, ["ROUTE.VEHICLE.TYPE.DESCRIPTION","VEHICLE.TYPE.DESCRIPTION","VEHICLE_TYPE"]));
    const xpt = (pick(row, ["ROUTE.DESTINATION_FACILITY.FACILITY_ID","DESTINATION_FACILITY.FACILITY_ID","XPT"]) || "").trim();
    const carrierName = pick(row, ["ROUTE.CARRIER.DISPLAY_NAME","CARRIER.DISPLAY_NAME","ROUTE.CARRIER.NAME","CARRIER","MLP"]) || "—";
    const initialDateMs = parseTsMs(pick(row, ["ROUTE.INITIAL_DATE","INITIAL_DATE","METRICS.INITIAL_DATE"]));
    const closeDateMs = parseTsMs(pick(row, ["METRICS.CLOSE_DATE","CLOSE_DATE"])) || null;

    return {
      routeId: pick(row, ["ROUTE.ID","ROUTE_ID","ID"]) || "—",
      facilityId,
      cycle, tipoRota, isAmbulancia, xpt,
      nexFlag: resolveNexFlag(xpt),
      mlpId: resolveMlp(xpt, vehicleType, carrierName),
      cidade: pick(row, ["ROUTE.DESTINATION_FACILITY.PLACE.CITY_NAME","CITY_NAME","CIDADE"]) || "—",
      vehicleType,
      placa: pick(row, ["ROUTE.VEHICLE.LICENSE_PLATE","LICENSE_PLATE","PLACA"]) || "—",
      driverId: pick(row, ["ROUTE.DRIVER.ID","DRIVER.ID","DRIVER_ID"]) || "—",
      status, dispatched, received, transferred, delivered, notDelivered,
      pnr: num(pick(row, ["SHIPMENTS.PNRC","PNRC","PNR"])),
      primeiraEntregaPct: delivered>0 ? clampPct((firstDayDelivered/delivered)*100) : 0,
      falhasDetalhe: mapFailures(row),
      totalCarregado, dsMomento, evolucaoRota, falhasMomento, dpph, orhHoras, orhHHMM,
      primeiraEntrega: parseHHMM(pick(row, ["METRICS.FIRST_STOP","FIRST_STOP","PRIMEIRA_ENTREGA"])) || "—",
      bipeOot: parseHHMM(pick(row, ["METRICS.INITIAL_DATE","BIPE_OOT"])) || "—",
      ultimaAtualizacao: parseHHMM(tsCol) || "—",
      ultimaAtualizacaoTs: parseTsMs(tsCol),
      inatividadeMin: 0,
      initialDateMs, closeDateMs,
    };
  }

  function mapRows(raw){
    const rows = raw.map(r => mapRow(normalizeKeys(r))).filter(Boolean);
    const ref = rows.reduce((mx,r)=>Math.max(mx,r.ultimaAtualizacaoTs),0);
    for(const r of rows){
      r.inatividadeMin = (ref>0 && r.ultimaAtualizacaoTs>0 && r.status!=="FINALIZADA")
        ? Math.max(0, Math.round((ref-r.ultimaAtualizacaoTs)/60000)) : 0;
    }
    return rows;
  }

  // ===================== AGGREGATIONS =====================
  const sum = (arr,key) => arr.reduce((a,i)=>a+(i[key]||0),0);

  function computeKpis(rows){
    const totalCarregado=sum(rows,"totalCarregado"), delivered=sum(rows,"delivered"),
      notDelivered=sum(rows,"notDelivered"), orhHoras=sum(rows,"orhHoras");
    const proc=delivered+notDelivered;
    return {
      totalCarregado, delivered, notDelivered, pendente: totalCarregado-proc, pnr: sum(rows,"pnr"),
      dsMomento: totalCarregado? round1(100-(notDelivered/totalCarregado)*100):100,
      evolucaoRota: totalCarregado? round1((proc/totalCarregado)*100):0,
      falhasMomento: totalCarregado? round1((notDelivered/totalCarregado)*100):0,
      dpph: orhHoras? round1(delivered/orhHoras):0,
      orhHoras: rows.length? round1(orhHoras/rows.length):0,
      rotas: rows.length,
      rotasEmRota: rows.filter(r=>r.status==="EM_ROTA").length,
      rotasFinalizadas: rows.filter(r=>r.status==="FINALIZADA").length,
      motoristas: new Set(rows.map(r=>r.driverId)).size,
      inativas: rows.filter(r=>r.inatividadeMin>INATIVIDADE_LIMIT_MIN).length,
    };
  }

  function computeFacilities(){
    return FACILITIES.map(fid=>{
      const scoped = ALL_ROWS.filter(r=>r.facilityId===fid);
      const k = computeKpis(scoped);
      return Object.assign({ facilityId: fid }, k);
    }).filter(f=>f.rotas>0);
  }

  function computeGroupRanking(rows, dim){
    const byKey=new Map();
    for(const r of rows){ const k=String(r[dim]); (byKey.get(k)||byKey.set(k,[]).get(k)).push(r); }
    const out=[];
    for(const [key,scoped] of byKey){
      const totalCarregado=sum(scoped,"totalCarregado"), delivered=sum(scoped,"delivered"),
        notDelivered=sum(scoped,"notDelivered"), orhHoras=sum(scoped,"orhHoras");
      const proc=delivered+notDelivered;
      const dsMomento= totalCarregado? round1(100-(notDelivered/totalCarregado)*100):100;
      out.push({ key, rotas: scoped.length, totalCarregado, delivered, notDelivered, pnr: sum(scoped,"pnr"),
        dsMomento, evolucaoRota: totalCarregado? round1((proc/totalCarregado)*100):0,
        falhasMomento: totalCarregado? round1((notDelivered/totalCarregado)*100):0,
        dpph: orhHoras? round1(delivered/orhHoras):0, gapMeta: round1(dsMomento-META_DS), atingiuMeta: dsMomento>=META_DS });
    }
    return out.sort((a,b)=>a.dsMomento-b.dsMomento);
  }

  function computeMlpRanking(rows){
    const byMlp=new Map();
    for(const r of rows){ (byMlp.get(r.mlpId)||byMlp.set(r.mlpId,[]).get(r.mlpId)).push(r); }
    const out=[];
    for(const [mlpId,scoped] of byMlp){
      const totalCarregado=sum(scoped,"totalCarregado"), delivered=sum(scoped,"delivered"),
        notDelivered=sum(scoped,"notDelivered"), orhHoras=sum(scoped,"orhHoras");
      const proc=delivered+notDelivered;
      const dsMomento= totalCarregado? round1(100-(notDelivered/totalCarregado)*100):100;
      const steamArr=scoped.map(r=>steamOutMin(r.bipeOot,r.primeiraEntrega)).filter(m=>m!=null);
      const steam= steamArr.length? round1(steamArr.reduce((a,m)=>a+m,0)/steamArr.length):0;
      out.push({ mlpId, svcs:[...new Set(scoped.map(r=>r.facilityId))].sort(), rotas: scoped.length,
        totalCarregado, delivered, notDelivered, dsMomento,
        dpph: orhHoras? round1(delivered/orhHoras):0, orhHoras: round1(orhHoras),
        steamOutMin: steam, pnr: sum(scoped,"pnr"),
        inativas: scoped.filter(r=>r.inatividadeMin>INATIVIDADE_LIMIT_MIN).length,
        atingiuMeta: dsMomento>=META_DS });
    }
    return out.sort((a,b)=>a.dsMomento-b.dsMomento);
  }

  function computeFailureReasons(rows){
    const totals=FAILURE_KEYS.map(key=>({ key, label:FAILURE_REASONS[key], total: rows.reduce((a,r)=>a+(r.falhasDetalhe[key]||0),0) }));
    const grand=totals.reduce((a,t)=>a+t.total,0)||1;
    return totals.map(t=>({...t, pct: round1((t.total/grand)*100)})).sort((a,b)=>b.total-a.total);
  }

  function computeFailureOffenders(rows){
    const stats=FAILURE_KEYS.map(key=>{
      let total=0; const byMlp=new Map();
      for(const r of rows){ const q=r.falhasDetalhe[key]||0; if(q<=0) continue; total+=q; byMlp.set(r.mlpId,(byMlp.get(r.mlpId)||0)+q); }
      let topMlp=null, topMlpTotal=0;
      for(const [m,q] of byMlp){ if(q>topMlpTotal){ topMlp=m; topMlpTotal=q; } }
      return { key, label:FAILURE_REASONS[key], total, topMlp, topMlpTotal };
    });
    const grand=stats.reduce((a,s)=>a+s.total,0)||1;
    return stats.map(s=>({...s, pct: round1((s.total/grand)*100)})).sort((a,b)=>b.total-a.total);
  }

  // ===================== CRITICAL =====================
  const MOTIVO_META = {
    inatividade: { label:"Inatividade", desc:`Sem atualização há mais de ${fmtMinHHMM(INATIVIDADE_CRITICA_MIN)}` },
    steamOut: { label:"Steam Out", desc:`Mais de ${fmtMinHHMM(STEAM_OUT_LIMIT_MIN)} até a 1ª entrega` },
    pnr: { label:"PNR", desc:"Pacotes não roteirizados/coletados" },
    insucessos: { label:"Insucessos", desc:`Taxa de falhas acima de ${FALHAS_CRITICA_PCT}%` },
    ds: { label:"DS abaixo da meta", desc:`DS Momento < ${META_DS}%` },
    dpph: { label:"DPPH baixo", desc:`Produtividade < ${DPPH_CRITICO} entregas/h` },
  };
  const MOTIVO_ORDER = ["inatividade","steamOut","pnr","insucessos","ds","dpph"];

  function avaliarRota(row){
    if(row.status==="FINALIZADA") return null;
    const steamMin=steamOutMin(row.bipeOot,row.primeiraEntrega);
    const falhasPct= row.totalCarregado>0 ? (row.notDelivered/row.totalCarregado)*100 : 0;
    const motivos=[];
    if(row.inatividadeMin>INATIVIDADE_CRITICA_MIN) motivos.push("inatividade");
    if(steamMin!=null && steamMin>STEAM_OUT_LIMIT_MIN) motivos.push("steamOut");
    if(row.pnr>0) motivos.push("pnr");
    if(row.totalCarregado>=10 && falhasPct>FALHAS_CRITICA_PCT) motivos.push("insucessos");
    if(row.totalCarregado>=10 && row.dsMomento<META_DS) motivos.push("ds");
    if(row.totalCarregado>=10 && row.dpph>0 && row.dpph<DPPH_CRITICO) motivos.push("dpph");
    if(motivos.length===0) return null;
    return { row, steamMin, falhasPct, motivos };
  }

  // ===================== STATE =====================
  let ALL_ROWS = [];           // rotas do dia (alimentam todas as abas)
  let UNFINISHED_ROWS = [];    // rotas de dias anteriores sem CLOSE_DATE
  let DIT_PAYLOAD = null;      // payload agregado do DIT D0
  let DIT_ERROR = null;
  let DIT_LOADED = false;
  let GENERATED_AT = null;
  const state = {
    svc: { selected:ALL, busca:"", sortKey:"dsMomento", dir:"asc" },
    mlp: { svc:ALL, sortKey:"dsMomento", dir:"asc" },
    rotas: { busca:"", svc:ALL, mlp:ALL, modal:ALL, status:ALL, sort:"piorDs" },
    critico: { svc:ALL, mlp:ALL },
    kpis: { dim:"mlpId", svc:ALL, mlp:ALL },
    ambulancias: { svc:ALL, busca:"" },
    nex: { svc:ALL, busca:"", xptSort:"dsAlcancavel", xptDir:"asc", xptOpen:{} },
    dit: { sub:"gerencial", critSvc:ALL, svc:ALL, mlp:ALL, classe:"Risco DIT", busca:"", openMlp:{}, openRoute:{} },
    "nao-finalizadas": { svc:ALL, busca:"" },
  };
  let activeTab = "svc";

  const mlpOptions = () => [...new Set(ALL_ROWS.map(r=>r.mlpId).filter(m=>m&&m!=="—"))].sort();
  const modalOptions = () => { const p=new Set(ALL_ROWS.map(r=>r.vehicleType).filter(v=>v&&v!=="—")); return VEHICLE_TYPES.filter(v=>p.has(v)); };

  function dsBadgeClass(ds){ if(ds>=97) return "b-good"; if(ds>=94) return "b-warn"; return "b-bad"; }
  function selectHtml(name, value, opts, allLabel){
    let h=`<select data-bind="${name}"><option value="${ALL}"${value===ALL?" selected":""}>${esc(allLabel)}</option>`;
    for(const o of opts){ const v = typeof o==="object"?o.v:o; const l = typeof o==="object"?o.l:o; h+=`<option value="${esc(v)}"${value===v?" selected":""}>${esc(l)}</option>`; }
    return h+`</select>`;
  }

  function dsTone(ds){ if(ds>=97) return "t-good"; if(ds>=94) return "t-warn"; return "t-bad"; }
  function dsBarColor(ds){ if(ds>=97) return "var(--success)"; if(ds>=94) return "var(--warning)"; return "var(--danger)"; }
  function sortableTh(tab, key, label){
    const s=state[tab]; const active=s.sortKey===key;
    const arrow = active ? (s.dir==="asc"?"▲":"▼") : "";
    return `<th class="r sortable${active?" active":""}" data-sort="${key}" data-tab="${tab}">${esc(label)} <span class="sortarrow">${arrow}</span></th>`;
  }
  function applySort(arr, tab){
    const s=state[tab];
    return [...arr].sort((a,b)=>{ const d=(a[s.sortKey]||0)-(b[s.sortKey]||0); return s.dir==="asc"?d:-d; });
  }

  // ===================== RENDER: EVOLUÇÃO SVC =====================
  function renderSvc(){
    const s=state.svc;
    const facilities=computeFacilities();
    const rows = s.selected===ALL ? ALL_ROWS : ALL_ROWS.filter(r=>r.facilityId===s.selected);
    const k=computeKpis(rows);

    const sk=(lbl,val,tone,hint)=>`<div class="kc"><span class="kl">${lbl}</span><span class="kv ${tone||''} num">${val}</span>${hint?`<span class="kh">${hint}</span>`:''}</div>`;
    const summary=`<div class="kgrid">
      ${sk("DS Momento",fmtPct(k.dsMomento),k.dsMomento>=META_DS?"success":"danger",`meta ${fmtPct(META_DS)}`)}
      ${sk("Evolução",fmtPct(k.evolucaoRota),"brand",`${fmtInt(k.delivered+k.notDelivered)} de ${fmtInt(k.totalCarregado)}`)}
      ${sk("Falhas",fmtPct(k.falhasMomento),"warning",`${fmtInt(k.notDelivered)} não entregues`)}
      ${sk("DPPH",fmtDec(k.dpph),"","entregas/hora")}
      ${sk("Carregado",fmtInt(k.totalCarregado),"")}
      ${sk("Entregues",fmtInt(k.delivered),"success")}
      ${sk("Pendentes",fmtInt(k.pendente),"warning")}
      ${sk("Rotas em rota",`${fmtInt(k.rotasEmRota)} / ${fmtInt(k.rotas)}`,"brand",`${fmtInt(k.rotasFinalizadas)} fim · ${fmtInt(k.motoristas)} motoristas`)}
    </div>`;

    // SVC breakdown cards (clicáveis)
    const breakdown=`<div class="svcgrid">${facilities.map(f=>{
      const active = s.selected===f.facilityId;
      return `<div class="card svccard${active?" active":""}" data-svc="${esc(f.facilityId)}" role="button" tabindex="0">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-weight:600">${esc(f.facilityId)}</span>
          <span class="num ${dsTone(f.dsMomento)}" style="font-size:17px">${fmtPct(f.dsMomento)}</span>
        </div>
        <div class="bartrack"><div class="barfill" style="width:${clampPct(f.evolucaoRota)}%;background:${dsBarColor(f.dsMomento)}"></div></div>
        <div style="display:flex;justify-content:space-between" class="small muted"><span>Evol. ${fmtPct(f.evolucaoRota)}</span><span>${f.rotasEmRota}/${f.rotas} rotas</span></div>
        <div style="display:flex;justify-content:space-between" class="small muted"><span>${fmtInt(f.delivered)} entreg.</span><span class="t-bad">${fmtInt(f.notDelivered)} falhas</span></div>
      </div>`;
    }).join("")}</div>`;

    // Gráfico DS por SVC (barras horizontais, domínio 80-100)
    const dsChart=`<div class="card pad">
      <h3 class="card-t">DS Momento por SVC</h3><p class="card-d">Delivery Success atual em cada SVC</p>
      <div style="margin-top:14px">${facilities.map(f=>{
        const pct=Math.max(0,Math.min(100,((f.dsMomento-80)/20)*100));
        return `<div class="hbar-row"><div class="muted">${esc(f.facilityId)}</div>
          <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${dsBarColor(f.dsMomento)}"></div></div>
          <div class="r num" style="font-weight:600">${fmtPct(f.dsMomento)}</div></div>`;
      }).join("")}</div></div>`;

    // Gráfico Evolução × Falhas por SVC (barras gêmeas)
    const evChart=`<div class="card pad">
      <h3 class="card-t">Evolução × Falhas por SVC</h3><p class="card-d">Percentual processado e taxa de falhas por SVC</p>
      <div class="legend"><span><span class="sw" style="background:var(--brand-blue)"></span>Evolução</span><span><span class="sw" style="background:var(--danger)"></span>Falhas</span></div>
      <div style="margin-top:12px">${facilities.map(f=>`<div class="grp2">
        <div class="lbl2 muted">${esc(f.facilityId)}</div>
        <div class="twin">
          <div class="bartrack"><div class="barfill blue" style="width:${clampPct(f.evolucaoRota)}%"></div></div>
          <div class="bartrack"><div class="barfill" style="width:${clampPct(f.falhasMomento)}%"></div></div>
        </div>
      </div>`).join("")}</div></div>`;

    // Ranking de DS por rota
    const q=s.busca.trim().toLowerCase();
    let base = q ? rows.filter(r=>r.routeId.toLowerCase().includes(q)||r.driverId.toLowerCase().includes(q)) : rows;
    const sorted=applySort(base,"svc");
    const rankTable=`<div class="card" style="overflow:hidden">
      <div class="card-h" style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;justify-content:space-between">
        <div><h3 class="card-t">Ranking de DS por rota</h3><p class="card-d">${fmtInt(sorted.length)} rotas — ordene para priorizar as críticas</p></div>
        <input type="text" data-bind="busca" value="${esc(s.busca)}" placeholder="Buscar rota ou motorista" />
      </div>
      <div class="tscroll"><table>
        <thead><tr><th class="r">#</th><th>Rota</th><th>Motorista</th><th>SVC</th><th>Status</th>
          ${sortableTh("svc","totalCarregado","Carregado")}${sortableTh("svc","evolucaoRota","Evolução")}${sortableTh("svc","dsMomento","DS")}${sortableTh("svc","falhasMomento","Falhas")}${sortableTh("svc","dpph","DPPH")}${sortableTh("svc","notDelivered","Não entr.")}
          <th class="r">ORH</th><th class="r">1ª entrega</th></tr></thead>
        <tbody>${sorted.map((r,i)=>`<tr${dsTone(r.dsMomento)==="t-bad"?' style="background:var(--danger-bg)"':''}>
          <td class="r muted small num">${i+1}</td><td class="num" style="font-weight:500">${esc(r.routeId)}</td>
          <td class="muted small" style="font-family:ui-monospace,monospace">${esc(r.driverId)}</td><td>${esc(r.facilityId)}</td>
          <td><span class="badge ${r.status==="FINALIZADA"?"b-good":r.status==="EM_ROTA"?"b-warn":""}">${STATUS_LABELS[r.status]}</span></td>
          <td class="r num">${fmtInt(r.totalCarregado)}</td><td class="r num">${fmtPct(r.evolucaoRota)}</td>
          <td class="r num ${dsTone(r.dsMomento)}">${fmtPct(r.dsMomento)}</td><td class="r num">${fmtPct(r.falhasMomento)}</td>
          <td class="r num">${fmtDec(r.dpph)}</td><td class="r num muted">${fmtInt(r.notDelivered)}</td>
          <td class="r num muted small">${esc(r.orhHHMM)}</td><td class="r num muted small">${esc(r.primeiraEntrega)}</td></tr>`).join("")}</tbody>
      </table></div></div>`;

    return `<div class="stack">
      <div><h2 class="card-t" style="font-size:14px;color:var(--muted);font-weight:500">${s.selected===ALL?"Visão consolidada — todos os SVCs":"SVC "+esc(s.selected)}</h2>
        <p class="card-d">Clique em um SVC abaixo para filtrar a operação</p></div>
      ${summary}
      ${breakdown}
      <div class="chartcols">${dsChart}${evChart}</div>
      ${rankTable}
    </div>`;
  }

  // ===================== RENDER: RANKING MLP =====================
  function renderMlp(){
    const s=state.mlp;
    const scoped = s.svc===ALL ? ALL_ROWS : ALL_ROWS.filter(r=>r.facilityId===s.svc);
    const ranking=computeMlpRanking(scoped);
    const sorted=applySort(ranking,"mlp");
    const foraMeta=ranking.filter(m=>!m.atingiuMeta);
    const escopo = s.svc===ALL ? "todos os SVCs" : "SVC "+s.svc;

    // Alerta de meta
    let alerta;
    if(ranking.length===0){
      alerta=`<div class="card pad muted">Nenhum parceiro com rotas no ${esc(escopo)} no momento.</div>`;
    } else if(foraMeta.length===0){
      alerta=`<div class="card pad" style="border-color:rgba(0,166,80,.3);background:var(--success-bg)">
        <div style="font-weight:600;color:var(--success)">Todos os parceiros dentro da meta</div>
        <div class="small" style="color:var(--success)">Os ${ranking.length} MLPs do ${esc(escopo)} estão com DS igual ou acima de ${fmtPct(META_DS)}.</div></div>`;
    } else {
      const pior=foraMeta.slice().sort((a,b)=>a.dsMomento-b.dsMomento)[0];
      alerta=`<div class="card pad danger-card" role="alert">
        <div style="font-weight:600;color:var(--danger)">${foraMeta.length} de ${ranking.length} parceiros abaixo da meta de DS (${fmtPct(META_DS)}) no ${esc(escopo)}</div>
        <div class="small" style="color:var(--danger);margin:4px 0 8px">Pior desempenho: <strong>${esc(pior.mlpId)}</strong> com DS de ${fmtPct(pior.dsMomento)} (${fmtDec(round1(pior.dsMomento-META_DS))} pp da meta).</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">${foraMeta.map(m=>`<span class="badge b-bad">${esc(m.mlpId)} · ${fmtPct(m.dsMomento)}</span>`).join("")}</div></div>`;
    }

    // Gráfico DS por MLP (barras horizontais, domínio 90-100, linha de meta)
    const dom0=Math.min(90,Math.floor(META_DS-8));
    const dsChart=`<div class="card pad">
      <h3 class="card-t">Ranking de MLP</h3><p class="card-d">Desempenho dos parceiros de last mile — meta de DS ${fmtPct(META_DS)}${s.svc!==ALL?` · filtrado por ${esc(s.svc)}`:" · todos os SVCs"}</p>
      <div style="margin-top:14px">
        ${ranking.map(m=>{
          const pct=Math.max(0,Math.min(100,((m.dsMomento-dom0)/(100-dom0))*100));
          const color=m.atingiuMeta?"var(--success)":"var(--danger)";
          return `<div class="hbar-row"><div class="muted" title="${esc(m.mlpId)}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.mlpId)}</div>
            <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="r num" style="font-weight:600">${fmtPct(m.dsMomento)}</div></div>`;
        }).join("")}
      </div>
      <div class="legend"><span><span class="sw" style="background:var(--success)"></span>Na meta</span><span><span class="sw" style="background:var(--danger)"></span>Fora da meta</span></div>
    </div>`;

    // Tabela
    const table=`<div class="card" style="overflow:hidden">
      <div class="tscroll"><table>
        <thead><tr><th class="r">#</th><th>Parceiro (MLP)</th><th>SVCs</th>
          ${sortableTh("mlp","rotas","Rotas")}${sortableTh("mlp","totalCarregado","Carregado")}${sortableTh("mlp","dsMomento","DS")}${sortableTh("mlp","falhasMomento","Falhas")}${sortableTh("mlp","dpph","DPPH")}${sortableTh("mlp","steamOutMin","Steam")}${sortableTh("mlp","inativas","Inativas")}
          <th class="r">Status</th></tr></thead>
        <tbody>${sorted.map((m,i)=>{
          const falhasPct = m.totalCarregado? round1((m.notDelivered/m.totalCarregado)*100):0;
          return `<tr${!m.atingiuMeta?' style="background:var(--danger-bg)"':''}>
            <td class="r muted small num">${i+1}</td><td style="font-weight:500">${esc(m.mlpId)}</td>
            <td><div style="display:flex;flex-wrap:wrap;gap:4px">${m.svcs.map(sv=>`<span class="badge" style="border-color:var(--border);background:var(--secondary);color:var(--muted)">${esc(sv)}</span>`).join("")}</div></td>
            <td class="r num">${fmtInt(m.rotas)}</td><td class="r num">${fmtInt(m.totalCarregado)}</td>
            <td class="r num ${m.atingiuMeta?'t-good':'t-bad'}" style="font-weight:600">${fmtPct(m.dsMomento)}</td>
            <td class="r num muted">${fmtPct(falhasPct)}</td><td class="r num">${fmtDec(m.dpph)}</td>
            <td class="r num ${m.steamOutMin>STEAM_OUT_LIMIT_MIN?'t-warn':''}">${fmtMinHHMM(m.steamOutMin)}</td>
            <td class="r num ${m.inativas>0?'t-bad':''}">${fmtInt(m.inativas)}</td>
            <td class="r"><span class="badge ${m.atingiuMeta?'b-good':'b-bad'}">${m.atingiuMeta?"Na meta":"Fora da meta"}</span></td></tr>`;
        }).join("")}</tbody>
      </table></div></div>`;

    return `<div class="stack">
      ${alerta}
      <div class="row" style="justify-content:flex-end">
        <label class="f"><span class="flbl">Filtrar por SVC</span>${selectHtml("svc",s.svc,FACILITIES,"Todos os SVCs")}</label>
      </div>
      ${dsChart}
      ${table}
    </div>`;
  }

  // ===================== RENDER: ROTAS =====================
  function renderRotas(){
    const s=state.rotas;
    const termo=s.busca.trim().toLowerCase();
    let filtered=ALL_ROWS.filter(r=>{
      if(s.svc!==ALL && r.facilityId!==s.svc) return false;
      if(s.mlp!==ALL && r.mlpId!==s.mlp) return false;
      if(s.modal!==ALL && r.vehicleType!==s.modal) return false;
      if(s.status!==ALL && r.status!==s.status) return false;
      if(termo){ const hay=`${r.routeId} ${r.placa} ${r.driverId} ${r.cidade}`.toLowerCase(); if(!hay.includes(termo)) return false; }
      return true;
    });
    const sorters={ piorDs:(a,b)=>a.dsMomento-b.dsMomento, melhorDs:(a,b)=>b.dsMomento-a.dsMomento,
      maisFalhas:(a,b)=>b.notDelivered-a.notDelivered, maisPnr:(a,b)=>b.pnr-a.pnr,
      maisCarregado:(a,b)=>b.totalCarregado-a.totalCarregado, maiorDpph:(a,b)=>b.dpph-a.dpph };
    filtered=[...filtered].sort(sorters[s.sort]);

    const totalFalhas=filtered.reduce((a,r)=>a+r.notDelivered,0);
    const totalPnr=filtered.reduce((a,r)=>a+r.pnr,0);
    const foraMeta=filtered.filter(r=>r.dsMomento<META_DS).length;
    const inativas=filtered.filter(r=>r.inatividadeMin>INATIVIDADE_CRITICA_MIN).length;

    const sortLabels={ piorDs:"Pior DS", melhorDs:"Melhor DS", maisFalhas:"Mais falhas", maisPnr:"Mais PNR", maisCarregado:"Mais carregado", maiorDpph:"Maior DPPH" };
    let sortSel=`<select data-bind="sort">`;
    for(const k in sortLabels) sortSel+=`<option value="${k}"${s.sort===k?" selected":""}>${sortLabels[k]}</option>`;
    sortSel+=`</select>`;

    let rowsHtml="";
    for(const r of filtered){
      const sm=steamOutMin(r.bipeOot,r.primeiraEntrega);
      const smCrit = sm!=null && sm>STEAM_OUT_LIMIT_MIN;
      const evoCrit = r.evolucaoRota<META_DS;
      const dsCrit = r.dsMomento<META_DS;
      const inaCrit = r.inatividadeMin>INATIVIDADE_CRITICA_MIN;
      rowsHtml+=`<tr${dsCrit?' style="background:rgba(225,25,0,.03)"':''}>
        <td><div style="font-weight:500">${esc(r.routeId)}</div><div class="small muted">${STATUS_LABELS[r.status]}</div></td>
        <td class="muted"><div>${esc(r.vehicleType)}</div><div class="small num">${esc(r.placa)}</div></td>
        <td class="muted">${esc(r.mlpId)}</td>
        <td class="r">${inaCrit?`<span class="badge b-bad num">⚠ ${fmtMinHHMM(r.inatividadeMin)}</span>`:`<span class="muted num">—</span>`}</td>
        <td class="r num">${fmtInt(r.totalCarregado)}</td>
        <td class="r num">${fmtInt(r.delivered)}</td>
        <td class="r ${r.notDelivered>0?'t-bad':''}" title="${esc(failureTooltip(r))}">${fmtInt(r.notDelivered)}</td>
        <td class="r num">${r.pnr>0?`<span class="t-warn">${fmtInt(r.pnr)}</span>`:`<span class="muted">0</span>`}</td>
        <td class="r">${sm==null?`<span class="muted num">—</span>`: smCrit?`<span class="badge b-warn num">⚠ ${fmtMinHHMM(sm)}</span>`:`<span class="num">${fmtMinHHMM(sm)}</span>`}</td>
        <td class="r num">${fmtDec(r.dpph)}</td>
        <td class="r mono small muted">${esc(r.orhHHMM)}</td>
        <td class="r mono small muted">${esc(r.bipeOot)}</td>
        <td class="r mono small muted">${esc(r.primeiraEntrega)}</td>
        <td class="r">${evoCrit?`<span class="t-bad num">⚠ ${fmtPct(r.evolucaoRota)}</span>`:`<span class="num">${fmtPct(r.evolucaoRota)}</span>`}</td>
        <td class="r"><span class="badge ${dsBadgeClass(r.dsMomento)} num">${fmtPct(r.dsMomento)}</span></td>
      </tr>`;
    }
    if(filtered.length===0) rowsHtml=`<tr><td colspan="15" style="height:120px;text-align:center" class="muted">Nenhuma rota encontrada com os filtros atuais.</td></tr>`;

    return `<div class="card" style="overflow:hidden">
      <div class="card-h">
        <div class="row" style="justify-content:space-between">
          <div>
            <h3 class="card-t">Monitoramento de rotas</h3>
            <p class="card-d">${fmtInt(filtered.length)} de ${fmtInt(ALL_ROWS.length)} rotas · ${fmtInt(totalFalhas)} falhas · ${fmtInt(totalPnr)} PNR · ${fmtInt(foraMeta)} abaixo da meta · ${fmtInt(inativas)} inativas</p>
          </div>
          <label class="f"><span class="flbl">Ordenar por</span>${sortSel}</label>
        </div>
        <div class="row" style="margin-top:12px">
          <label class="f"><span class="flbl">Buscar</span><input type="text" data-bind="busca" value="${esc(s.busca)}" placeholder="Rota, placa, motorista, cidade…"></label>
          <label class="f"><span class="flbl">SVC</span>${selectHtml("svc",s.svc,FACILITIES,"Todos os SVCs")}</label>
          <label class="f"><span class="flbl">Transportadora</span>${selectHtml("mlp",s.mlp,mlpOptions(),"Todas as transportadoras")}</label>
          <label class="f"><span class="flbl">Modal</span>${selectHtml("modal",s.modal,modalOptions(),"Todos os modais")}</label>
          <label class="f"><span class="flbl">Status</span>${selectHtml("status",s.status,[{v:"EM_ROTA",l:"Em rota"},{v:"FINALIZADA",l:"Finalizada"},{v:"NAO_INICIADA",l:"Não iniciada"}],"Todos os status")}</label>
        </div>
      </div>
      <div class="tscroll"><table>
        <thead><tr>
          <th>Rota</th><th>Modal</th><th>Transportadora</th><th class="r">Inatividade</th><th class="r">Pacotes</th>
          <th class="r">Entregues</th><th class="r">Falhas</th><th class="r">PNR</th><th class="r">Steam Out</th>
          <th class="r">DPPH</th><th class="r">ORH</th><th class="r">Início Rota</th><th class="r">1ª Entrega</th><th class="r">Evolução</th><th class="r">DS</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table></div>
    </div>`;
  }
  function failureTooltip(r){
    const list=FAILURE_KEYS.map(k=>({label:FAILURE_REASONS[k],total:r.falhasDetalhe[k]})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
    if(!list.length) return "Sem falhas";
    return "Motivos: "+list.map(x=>`${x.label}: ${x.total}`).join(" · ");
  }

  // ===================== RENDER: CRITICO =====================
  function renderCritico(){
    const s=state.critico;
    const filteredRows=ALL_ROWS.filter(r=>(s.svc===ALL||r.facilityId===s.svc)&&(s.mlp===ALL||r.mlpId===s.mlp));
    const criticas=filteredRows.map(avaliarRota).filter(Boolean)
      .sort((a,b)=>b.motivos.length-a.motivos.length || a.row.dsMomento-b.row.dsMomento);
    const porMotivo={}; for(const m of MOTIVO_ORDER) porMotivo[m]=criticas.filter(c=>c.motivos.includes(m)).length;
    const byMlp=new Map(); for(const c of criticas) byMlp.set(c.row.mlpId,(byMlp.get(c.row.mlpId)||0)+1);
    const ofensores=[...byMlp.entries()].map(([mlpId,n])=>({mlpId,criticas:n})).sort((a,b)=>b.criticas-a.criticas);

    const totalRotas=filteredRows.filter(r=>r.status!=="FINALIZADA").length;
    const pctCriticas= totalRotas>0 ? (criticas.length/totalRotas)*100 : 0;
    const pacotesEmRisco=criticas.reduce((a,c)=>a+Math.max(0,c.row.totalCarregado-c.row.delivered-c.row.notDelivered),0);
    const multiplos=criticas.filter(c=>c.motivos.length>=2).length;
    let topMot=MOTIVO_ORDER[0]; for(const m of MOTIVO_ORDER) if(porMotivo[m]>porMotivo[topMot]) topMot=m;

    const motivoCards=MOTIVO_ORDER.map(m=>`<div class="kc">
      <span class="kl">${MOTIVO_META[m].label}</span>
      <span class="kv num">${fmtInt(porMotivo[m])}</span>
      <span class="kh">${MOTIVO_META[m].desc}</span></div>`).join("");

    const maxOf=Math.max(1,...ofensores.map(o=>o.criticas));
    const ofChart= ofensores.length===0 ? `<p class="loading">Nenhuma rota crítica para exibir.</p>` :
      ofensores.map(o=>`<div class="hbar-row">
        <div class="muted" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(o.mlpId)}">${esc(o.mlpId)}</div>
        <div class="hbar-track"><div class="hbar-fill" style="width:${(o.criticas/maxOf)*100}%;background:var(--danger)"></div></div>
        <div class="r num" style="font-weight:600">${fmtInt(o.criticas)}</div></div>`).join("");

    let detalhe="";
    for(const {row,steamMin,falhasPct,motivos} of criticas){
      detalhe+=`<tr style="background:rgba(225,25,0,.02)">
        <td style="font-weight:500">${esc(row.routeId)}</td>
        <td class="muted">${esc(row.mlpId)}</td>
        <td class="muted">${esc(row.facilityId)}</td>
        <td>${motivos.map(m=>`<span class="badge b-bad">${MOTIVO_META[m].label}</span>`).join(" ")}</td>
        <td class="r num">${row.inatividadeMin>INATIVIDADE_CRITICA_MIN?`<span class="t-bad">${fmtMinHHMM(row.inatividadeMin)}</span>`:`<span class="muted">—</span>`}</td>
        <td class="r num">${steamMin!=null&&steamMin>STEAM_OUT_LIMIT_MIN?`<span class="t-warn">${fmtMinHHMM(steamMin)}</span>`:`<span class="muted">${steamMin!=null?fmtMinHHMM(steamMin):"—"}</span>`}</td>
        <td class="r num">${row.pnr>0?`<span class="t-warn">${fmtInt(row.pnr)}</span>`:`<span class="muted">0</span>`}</td>
        <td class="r num">${fmtInt(row.notDelivered)} <span class="small muted">(${fmtPct(falhasPct)})</span></td>
        <td class="r num">${row.dpph>0&&row.dpph<DPPH_CRITICO?`<span class="t-bad">${fmtDec(row.dpph)}</span>`:`<span class="muted">${fmtDec(row.dpph)}</span>`}</td>
        <td class="r num"><span class="${row.dsMomento<META_DS?'t-bad':''}">${fmtPct(row.dsMomento)}</span></td>
      </tr>`;
    }
    if(criticas.length===0) detalhe=`<tr><td colspan="10" style="height:120px;text-align:center" class="muted">Nenhuma rota crítica no momento. Operação sob controle.</td></tr>`;

    return `<div class="stack">
      <div class="row">
        <label class="f"><span class="flbl">SVC</span>${selectHtml("svc",s.svc,FACILITIES,"Todos os SVCs")}</label>
        <label class="f"><span class="flbl">Transportadora</span>${selectHtml("mlp",s.mlp,mlpOptions(),"Todas as transportadoras")}</label>
      </div>

      <div class="card pad danger-card">
        <h3 class="card-t" style="color:var(--danger)">⚠ Rotas críticas — atenção imediata</h3>
        <p class="card-d">Rotas em operação que estão (ou vão) impactar o resultado por inatividade, steam out, PNR, insucessos, DS abaixo da meta ou baixa produtividade.</p>
        <div class="kgrid" style="grid-template-columns:repeat(2,1fr);margin-top:14px">
          <div class="kc" style="border-color:rgba(225,25,0,.4);background:var(--danger-bg-strong)"><span class="kl">Rotas críticas</span><span class="kv danger num">${fmtInt(criticas.length)}</span><span class="kh">${fmtPct(pctCriticas)} das ${fmtInt(totalRotas)} ativas</span></div>
          <div class="kc"><span class="kl">Múltiplos alertas</span><span class="kv num">${fmtInt(multiplos)}</span><span class="kh">2+ motivos na mesma rota</span></div>
          <div class="kc"><span class="kl">Pacotes em risco</span><span class="kv num">${fmtInt(pacotesEmRisco)}</span><span class="kh">carregados sem desfecho</span></div>
          <div class="kc"><span class="kl">Pior motivo</span><span class="kv">${MOTIVO_META[topMot].label}</span><span class="kh">${fmtInt(Math.max(...Object.values(porMotivo)))} rotas</span></div>
        </div>
      </div>

      <div class="mgrid">${motivoCards}</div>

      <div class="card pad">
        <h3 class="card-t">Transportadoras ofensoras de rotas críticas</h3>
        <p class="card-d">Quantidade de rotas críticas concentradas em cada transportadora</p>
        <div style="margin-top:14px">${ofChart}</div>
      </div>

      <div class="card" style="overflow:hidden">
        <div class="card-h"><h3 class="card-t">Detalhe das rotas críticas</h3><p class="card-d">${fmtInt(criticas.length)} rotas · ordenadas por nº de alertas e pior DS</p></div>
        <div class="tscroll" style="max-height:560px"><table>
          <thead><tr><th>Rota</th><th>Transportadora</th><th>SVC</th><th>Alertas</th><th class="r">Inatividade</th><th class="r">Steam Out</th><th class="r">PNR</th><th class="r">Falhas</th><th class="r">DPPH</th><th class="r">DS</th></tr></thead>
          <tbody>${detalhe}</tbody>
        </table></div>
      </div>
    </div>`;
  }

  // ===================== RENDER: KPIS =====================
  function renderKpis(){
    const s=state.kpis;
    const scoped = s.mlp===ALL ? ALL_ROWS : ALL_ROWS.filter(r=>r.mlpId===s.mlp);
    const DIMS=[{value:"mlpId",label:"Transportadora",col:"Transportadora"},{value:"vehicleType",label:"Modal",col:"Modal"}];
    const dims = s.mlp===ALL ? DIMS : DIMS.filter(d=>d.value!=="mlpId");
    const effDim = (s.mlp!==ALL && s.dim==="mlpId") ? "vehicleType" : s.dim;
    const dimLabel = DIMS.find(d=>d.value===effDim);

    const svcScoped = s.svc===ALL ? scoped : scoped.filter(r=>r.facilityId===s.svc);
    const ranking = computeGroupRanking(svcScoped, effDim);
    const failures = computeFailureReasons(svcScoped);
    const offenders = computeFailureOffenders(svcScoped).filter(o=>o.total>0);
    const kpis = computeKpis(svcScoped);
    const mlpKpis = computeMlpRanking(svcScoped);

    const naMeta=ranking.filter(g=>g.atingiuMeta).length, foraMeta=ranking.length-naMeta;

    let dimSel=`<select data-bind="dim">`; for(const d of dims) dimSel+=`<option value="${d.value}"${effDim===d.value?" selected":""}>${d.label}</option>`; dimSel+=`</select>`;

    const sk=(lbl,val,tone,hint)=>`<div class="kc"><span class="kl">${lbl}</span><span class="kv ${tone||''} num">${val}</span>${hint?`<span class="kh">${hint}</span>`:''}</div>`;
    const summary=`<div class="kgrid">
      ${sk("DS Momento",fmtPct(kpis.dsMomento),kpis.dsMomento>=META_DS?"success":"danger",`meta ${fmtPct(META_DS)}`)}
      ${sk("Evolução",fmtPct(kpis.evolucaoRota),"brand")}
      ${sk("Falhas",fmtPct(kpis.falhasMomento),"warning")}
      ${sk("Carregado",fmtInt(kpis.totalCarregado),"",`${fmtInt(kpis.rotas)} rotas`)}
      ${sk("Não entregues",fmtInt(kpis.notDelivered),"danger",`de ${fmtInt(kpis.totalCarregado)}`)}
      ${sk("DPPH",fmtDec(kpis.dpph),"","entregas/hora")}
      ${sk("PNR",fmtInt(kpis.pnr),"warning","não roteirizados")}
      ${sk("Inativas",fmtInt(kpis.inativas),kpis.inativas>0?"danger":"success",`> ${INATIVIDADE_LIMIT_MIN}min`)}
    </div>`;

    // MLP breakdown
    const mlpCards = mlpKpis.length===0 ? "" : `<div class="card pad">
      <h3 class="card-t">Steam Out · ORH · DPPH · PNR por transportadora</h3>
      <p class="card-d">Resumo por parceiro — steam out acima de 01h e rotas inativas (${INATIVIDADE_LIMIT_MIN}min+) em destaque</p>
      <div class="mlpgrid" style="margin-top:14px">${mlpKpis.map(m=>{
        const sc=m.steamOutMin>STEAM_OUT_LIMIT_MIN;
        return `<div class="card pad">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-weight:600">${esc(m.mlpId)}</span></div>
          <div class="small muted" style="margin-bottom:8px">${fmtInt(m.rotas)} rotas · ${m.svcs.join(", ")}</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
            <div class="metric"><span class="ml">Steam</span><span class="mv ${sc?'t-warn':''} num">${fmtMinHHMM(m.steamOutMin)}</span></div>
            <div class="metric"><span class="ml">ORH</span><span class="mv num">${fmtDec(m.orhHoras)}</span></div>
            <div class="metric"><span class="ml">DPPH</span><span class="mv num">${fmtDec(m.dpph)}</span></div>
            <div class="metric"><span class="ml">PNR</span><span class="mv num">${fmtInt(m.pnr)}</span></div>
            <div class="metric"><span class="ml">Inativas</span><span class="mv ${m.inativas>0?'t-bad':''} num">${fmtInt(m.inativas)}</span></div>
            <div class="metric"><span class="ml">DS</span><span class="mv ${m.atingiuMeta?'t-good':'t-bad'} num">${fmtPct(m.dsMomento)}</span></div>
          </div></div>`;
      }).join("")}</div></div>`;

    // DS chart (horizontal bars, domain 80-100)
    const dsChart=`<div class="card pad">
      <h3 class="card-t">DS Momento por ${dimLabel.label.toLowerCase()}</h3>
      <p class="card-d">Meta de ${fmtPct(META_DS)}. Verde acima, vermelho abaixo.</p>
      <div style="margin-top:14px">${ranking.map(g=>{
        const pct=Math.max(0,Math.min(100,((g.dsMomento-80)/20)*100));
        const color=g.dsMomento>=META_DS?"var(--success)":"var(--danger)";
        return `<div class="hbar-row"><div class="muted" title="${esc(g.key)}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g.key)}</div>
          <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="r num" style="font-weight:600">${fmtPct(g.dsMomento)}</div></div>`;
      }).join("")}</div></div>`;

    // Failure offenders
    const maxOf=Math.max(1,...offenders.map(o=>o.total));
    const totalIns=offenders.reduce((a,o)=>a+o.total,0);
    const ofBlock=`<div class="card pad">
      <div class="row" style="justify-content:space-between">
        <div><h3 class="card-t">Ofensores de insucesso por motivo</h3><p class="card-d">Quantidade de não entregas por motivo e a transportadora ofensora de cada um</p></div>
        ${offenders[0]?`<span class="badge b-bad">Maior ofensor: ${esc(offenders[0].label)} (${fmtInt(offenders[0].total)})</span>`:''}
      </div>
      <div style="margin-top:14px;display:flex;flex-direction:column;gap:12px">
      ${offenders.length===0?`<p class="loading">Nenhum insucesso registrado no recorte.</p>`:
        offenders.map((o,i)=>`<div class="offender">
          <div class="grow" style="min-width:0">
            <div class="barhead"><span style="font-weight:500;display:flex;align-items:center;gap:8px"><span class="rank">${i+1}</span>${esc(o.label)}</span><span class="muted num">${fmtInt(o.total)} · ${fmtPct(o.pct)}</span></div>
            <div class="bartrack" style="margin-top:6px"><div class="barfill" style="width:${(o.total/maxOf)*100}%"></div></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;min-width:200px">
            <div style="min-width:0"><div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(o.topMlp||"—")}</div>
            <div class="small muted">ofensor · ${fmtInt(o.topMlpTotal)} de ${fmtInt(o.total)}</div></div>
          </div></div>`).join("")+
        `<p class="small muted">${fmtInt(totalIns)} insucessos no recorte, distribuídos em ${offenders.length} ${offenders.length===1?'motivo':'motivos'}.</p>`}
      </div></div>`;

    // ranking + motivos
    const maxFail=Math.max(1,...failures.map(f=>f.total));
    const rankTable=`<div class="card" style="overflow:hidden">
      <div class="card-h"><h3 class="card-t">Ranking por ${dimLabel.label.toLowerCase()}</h3><p class="card-d">Ordenado por DS (piores primeiro)</p></div>
      <div class="tscroll"><table>
        <thead><tr><th>${dimLabel.col}</th><th class="r">Rotas</th><th class="r">Carreg.</th><th class="r">Falhas</th><th class="r">PNR</th><th class="r">DS</th><th class="r">Gap meta</th></tr></thead>
        <tbody>${ranking.map(g=>`<tr><td style="font-weight:500">${esc(g.key)}</td><td class="r num">${fmtInt(g.rotas)}</td><td class="r num">${fmtInt(g.totalCarregado)}</td><td class="r num">${fmtInt(g.notDelivered)}</td><td class="r num">${fmtInt(g.pnr)}</td><td class="r num" style="font-weight:600">${fmtPct(g.dsMomento)}</td><td class="r num ${g.atingiuMeta?'t-good':'t-bad'}">${g.gapMeta>0?"+":""}${fmtDec(g.gapMeta)}</td></tr>`).join("")}</tbody>
      </table></div></div>`;

    const motivosCard=`<div class="card pad">
      <h3 class="card-t">Motivos de não entrega</h3><p class="card-d">Distribuição das falhas no recorte atual</p>
      <div style="margin-top:14px;display:flex;flex-direction:column;gap:12px">
      ${failures.filter(f=>f.total>0).length===0?`<p class="loading">Nenhuma falha registrada no recorte.</p>`:
        failures.filter(f=>f.total>0).map(f=>`<div class="barline"><div class="barhead"><span>${esc(f.label)}</span><span class="muted num">${fmtInt(f.total)} · ${fmtPct(f.pct)}</span></div><div class="bartrack"><div class="barfill" style="width:${(f.total/maxFail)*100}%"></div></div></div>`).join("")}
      </div></div>`;

    return `<div class="stack">
      <div class="row" style="justify-content:space-between">
        <div class="row">
          <label class="f"><span class="flbl">Abrir KPIs por</span>${dimSel}</label>
          <label class="f"><span class="flbl">Transportadora</span>${selectHtml("mlp",s.mlp,mlpOptions(),"Todas as transportadoras")}</label>
          <label class="f"><span class="flbl">SVC</span>${selectHtml("svc",s.svc,FACILITIES,"Todos os SVCs")}</label>
        </div>
        <div style="display:flex;gap:8px;align-items:center"><span class="badge b-good">${naMeta} na meta</span><span class="badge b-bad">${foraMeta} fora da meta</span></div>
      </div>
      ${summary}
      ${mlpCards}
      ${dsChart}
      ${ofBlock}
      <div class="twocol">${rankTable}${motivosCard}</div>
    </div>`;
  }

  // ===================== HELPERS DAS NOVAS ABAS =====================
  // KPI completo (DS Momento = entregue/carregado; DS Alcançável = 100 - falhas/carregado).
  function kpiFull(rows){
    const tc=sum(rows,"totalCarregado"), del=sum(rows,"delivered"), nd=sum(rows,"notDelivered"), orh=sum(rows,"orhHoras");
    const proc=del+nd;
    return { rotas:rows.length, totalCarregado:tc, delivered:del, notDelivered:nd, pnr:sum(rows,"pnr"),
      pendente:Math.max(0,tc-proc),
      dsMomento: tc? round1((del/tc)*100):100,
      dsAlcancavel: tc? round1(100-(nd/tc)*100):100,
      evolucaoRota: tc? round1((proc/tc)*100):0,
      falhasMomento: tc? round1((nd/tc)*100):0,
      dpph: orh? round1(del/orh):0 };
  }
  function buildGroupKpi(key, g){
    const tc=sum(g,"totalCarregado"), del=sum(g,"delivered"), nd=sum(g,"notDelivered"); const proc=del+nd;
    return { key, rotas:g.length, totalCarregado:tc, delivered:del, notDelivered:nd, pnr:sum(g,"pnr"),
      dsMomento: tc? round1((del/tc)*100):100, dsAlcancavel: tc? round1(100-(nd/tc)*100):100,
      spr: g.length? round1(tc/g.length):0, evolucaoRota: tc? round1((proc/tc)*100):0,
      inativas: g.filter(r=>r.inatividadeMin>INATIVIDADE_LIMIT_MIN).length,
      gapMeta: round1((tc? 100-(nd/tc)*100:100)-META_DS), atingiuMeta:(tc? 100-(nd/tc)*100:100)>=META_DS };
  }
  function groupRows(rows, keyFn){ const m=new Map(); for(const r of rows){ const k=keyFn(r); const a=m.get(k)||[]; a.push(r); m.set(k,a); } return m; }
  function fmtDuracao(min){ if(!Number.isFinite(min)||min<=0) return "—"; const d=Math.floor(min/1440), h=Math.floor((min%1440)/60), mm=Math.round(min%60); return d>0?`${d}d ${h}h${pad2(mm)}`:`${h}h${pad2(mm)}`; }
  function fmtDataHora(ms){ if(!ms) return "—"; return new Date(ms).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}); }
  function flagBadge(flag){ if(flag==="BRNMG NEX") return `<span class="badge" style="border-color:rgba(52,131,250,.3);background:rgba(52,131,250,.12);color:var(--brand-blue)">${flag}</span>`; if(flag==="BRDMG DC") return `<span class="badge" style="border-color:var(--border);background:var(--secondary);color:var(--fg)">${flag}</span>`; return `<span class="muted">—</span>`; }

  // ===================== DIT D0: DADOS =====================
  function ditClass(raw){ const v=(raw||"").trim().toLowerCase(); if(v.includes("risco")&&!v.includes("sem")) return "Risco DIT"; if(v.includes("pendente")) return "Pendente"; return "Sem Risco DIT"; }
  function ditHt(raw){ const v=(raw||"").trim().toUpperCase(); return (v==="ON_TIME"||v==="DELAY"||v==="EARLY")?v:"—"; }
  function ss(v){ return v==null?"":String(v).trim(); }
  function dpct(n,d){ return d>0? Math.round((n/d)*1000)/10:0; }
  function mapDitRow(r){
    const shipmentId=ss(r.SHP_SHIPMENT_ID), facilityId=ss(r.SHP_LG_FACILITY_ID);
    if(!shipmentId && !facilityId) return null;
    return { shipmentId, routeId:ss(r.SHP_LG_ROUTE_ID), facilityId:facilityId||"—",
      mlp:ss(r.SHP_COMPANY_NAME)||"—", plate:ss(r.SHP_LG_VEHICLE_PLATE_ID),
      vehicleType:normalizeModal(r.SHP_LG_VEHICLE_TYPE), driverId:ss(r.SHP_LG_DRIVER_ID),
      subStatus:ss(r.SHP_LG_SHIPMENT_SUB_STATUS)||"—", routeStatus:ss(r.SHP_LG_ROUTE_STATUS),
      lastCheck:ss(r.SHP_LG_LAST_SHIPMENT_CHK_DT), promise:ss(r.DT_ORIGINAL_PROMISE),
      htType:ditHt(r.DEV_HT_TYPE), addressType:ss(r.ADDRESS_TYPE)||"—",
      cluster:ss(r.ADDRESS_CLUSTER_ID), classificacao:ditClass(r.CLASSIFICACAO_DIT) };
  }
  function ditGroupBy(rows, keyFn){
    const map=new Map();
    for(const r of rows){ const k=keyFn(r); if(!k||k==="—") continue; const a=map.get(k)||[]; a.push(r); map.set(k,a); }
    return [...map.entries()].map(([key,list])=>{
      const total=list.length, entregues=list.filter(x=>ENTREGUE_SUB.has(x.subStatus)).length,
        riscoDit=list.filter(x=>x.classificacao==="Risco DIT").length, pendente=list.filter(x=>x.classificacao==="Pendente").length;
      return { key,total,entregues,pendente,riscoDit,semRisco:total-riscoDit-pendente,
        pctRisco:dpct(riscoDit,total), pctEntregue:dpct(entregues,total) };
    }).sort((a,b)=>b.riscoDit-a.riscoDit||b.total-a.total);
  }
  function ditDist(rows, keyFn){ const m=new Map(); for(const r of rows){ const k=keyFn(r)||"—"; m.set(k,(m.get(k)||0)+1); } return [...m.entries()].map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value); }
  function aggregateDit(rows){
    const total=rows.length, entregues=rows.filter(r=>ENTREGUE_SUB.has(r.subStatus)).length,
      riscoDit=rows.filter(r=>r.classificacao==="Risco DIT").length, pendente=rows.filter(r=>r.classificacao==="Pendente").length,
      onTime=rows.filter(r=>r.htType==="ON_TIME").length, delay=rows.filter(r=>r.htType==="DELAY").length, early=rows.filter(r=>r.htType==="EARLY").length;
    const comJanela=onTime+delay+early;
    return { total,entregues,pctEntregue:dpct(entregues,total),semRisco:total-riscoDit-pendente,pendente,riscoDit,
      pctRisco:dpct(riscoDit,total),pctPendente:dpct(pendente,total),onTime,delay,early,pctOnTime:dpct(onTime,comJanela),
      facilities:[...new Set(rows.map(r=>r.facilityId).filter(x=>x&&x!=="—"))].sort(),
      mlps:[...new Set(rows.map(r=>r.mlp).filter(x=>x&&x!=="—"))].sort(),
      porSvc:ditGroupBy(rows,r=>r.facilityId), porMlp:ditGroupBy(rows,r=>r.mlp),
      distSubStatus:ditDist(rows,r=>r.subStatus), distAddress:ditDist(rows,r=>r.addressType),
      motivosRisco:ditDist(rows.filter(r=>r.classificacao==="Risco DIT"),r=>r.subStatus),
      pendentesPorSvc:ditDist(rows.filter(r=>r.classificacao==="Pendente"),r=>r.facilityId),
      rows };
  }
  async function loadDit(){
    try{
      const res=await fetch(DIT_CSV_URL,{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const parsed=Papa.parse(await res.text(),{header:true,skipEmptyLines:true});
      const rows=(parsed.data||[]).map(mapDitRow).filter(Boolean);
      if(rows.length===0) throw new Error("CSV DIT sem linhas válidas.");
      DIT_PAYLOAD=aggregateDit(rows); DIT_ERROR=null;
    }catch(err){ DIT_ERROR=err.message; }
    DIT_LOADED=true;
    if(activeTab==="dit") document.getElementById("tab-dit").innerHTML=renderDit();
    if(activeTab==="resumo") document.getElementById("tab-resumo").innerHTML=renderResumo();
    bindControls();
  }

  // ===================== RENDER: AMBULÂNCIAS =====================
  function renderAmbulancias(){
    const s=state.ambulancias;
    const scoped = s.svc===ALL ? ALL_ROWS : ALL_ROWS.filter(r=>r.facilityId===s.svc);
    const amb = scoped.filter(r=>r.isAmbulancia);
    const k=kpiFull(amb);
    const spr = amb.length? round1(k.totalCarregado/amb.length):0;
    const pctAbertura = scoped.length? (amb.length/scoped.length)*100:0;
    const nonAmb=scoped.filter(r=>!r.isAmbulancia);
    const dsAll = scoped.length && sum(scoped,"totalCarregado")? 100-(sum(scoped,"notDelivered")/sum(scoped,"totalCarregado"))*100:100;
    const dsNon = sum(nonAmb,"totalCarregado")? 100-(sum(nonAmb,"notDelivered")/sum(nonAmb,"totalCarregado"))*100:100;
    const impacto = round1(dsAll-dsNon);

    const sk=(lbl,val,tone,hint)=>`<div class="kc"><span class="kl">${lbl}</span><span class="kv ${tone||''} num">${val}</span>${hint?`<span class="kh">${hint}</span>`:''}</div>`;
    const summary=`<div class="kgrid" style="grid-template-columns:repeat(2,1fr)">
      ${sk("Ambulâncias abertas",fmtInt(amb.length),"warning",`${fmtPct(pctAbertura)} das ${fmtInt(scoped.length)} rotas`)}
      ${sk("SPR (pacotes/rota)",fmtDec(spr),"brand",`${fmtInt(k.totalCarregado)} pacotes em ambulâncias`)}
      ${sk("Impacto na DS",`${impacto>0?"+":""}${fmtDec(impacto)} pp`,impacto<0?"danger":"success","DS geral vs. sem ambulâncias")}
      ${sk("DS Alcançável",fmtPct(k.dsAlcancavel),k.dsAlcancavel>=META_DS?"success":"danger",`DS Mom. ${fmtPct(k.dsMomento)} · ${fmtInt(k.notDelivered)} falhas`)}
    </div>`;

    const filtro=`<div class="row" style="justify-content:flex-end"><label class="f"><span class="flbl">SVC</span>${selectHtml("svc",s.svc,FACILITIES,"Todos os SVCs")}</label></div>`;
    const header=`<div><h2 class="card-t">Ambulâncias abertas</h2><p class="card-d">Rotas abertas fora do planejado (suporte / reversão) — ${s.svc===ALL?"todos os SVCs":"SVC "+esc(s.svc)}</p></div>`;

    if(amb.length===0) return `<div class="stack">${header}${filtro}${summary}<div class="card pad muted" style="text-align:center">Nenhuma ambulância aberta ${s.svc===ALL?"na operação":"no SVC "+esc(s.svc)} no momento.</div></div>`;

    const groupTable=(title,sub,keyLabel,data)=>`<div class="card" style="overflow:hidden">
      <div class="card-h"><h3 class="card-t">${title}</h3><p class="card-d">${sub}</p></div>
      <div class="tscroll"><table><thead><tr><th>${keyLabel}</th><th class="r">Rotas</th><th class="r">Pacotes</th><th class="r">Falhas</th><th class="r">DS</th></tr></thead>
      <tbody>${data.map(g=>`<tr><td style="font-weight:500">${esc(g.key)}</td><td class="r num">${fmtInt(g.rotas)}</td><td class="r num">${fmtInt(g.totalCarregado)}</td>
        <td class="r num ${g.notDelivered>0?'t-bad':'muted'}">${fmtInt(g.notDelivered)}</td>
        <td class="r"><span class="badge ${dsBadgeClass(g.dsAlcancavel)} num">${fmtPct(g.dsMomento)}</span></td></tr>`).join("")}</tbody></table></div></div>`;

    const porFac = s.svc===ALL ? [...groupRows(amb,r=>r.facilityId).entries()].map(([k2,g])=>buildGroupKpi(k2,g)).sort((a,b)=>b.rotas-a.rotas) : [];
    const porModal=[...groupRows(amb,r=>r.vehicleType).entries()].map(([k2,g])=>buildGroupKpi(k2,g)).sort((a,b)=>b.rotas-a.rotas);
    const porMlp=[...groupRows(amb,r=>r.mlpId).entries()].map(([k2,g])=>buildGroupKpi(k2,g)).sort((a,b)=>b.rotas-a.rotas);

    return `<div class="stack">
      ${header}${filtro}${summary}
      ${s.svc===ALL?groupTable("Abertura por SVC","Ambulâncias, SPR e DS por SVC","SVC",porFac):""}
      <div class="twocol" style="grid-template-columns:1fr 1fr">
        ${groupTable("Abertura por modal","Ambulâncias por tipo de veículo","Modal",porModal)}
        ${groupTable("Abertura por MLP","Ambulâncias por transportadora","Transportadora",porMlp)}
      </div>
    </div>`;
  }

  // ===================== RENDER: MONITORAMENTO NEX =====================
  function renderNex(){
    const s=state.nex;
    const scopedAll = s.svc===ALL ? ALL_ROWS : ALL_ROWS.filter(r=>r.facilityId===s.svc);
    const nex = scopedAll.filter(r=>r.nexFlag!==null);
    const k=kpiFull(nex);
    const brnmg=nex.filter(r=>r.nexFlag==="BRNMG NEX").length, brdmg=nex.filter(r=>r.nexFlag==="BRDMG DC").length;
    const inativasRows=nex.filter(r=>r.inatividadeMin>INATIVIDADE_LIMIT_MIN && r.status!=="FINALIZADA").sort((a,b)=>b.inatividadeMin-a.inatividadeMin);

    const sk=(lbl,val,tone,hint)=>`<div class="kc"><span class="kl">${lbl}</span><span class="kv ${tone||''} num">${val}</span>${hint?`<span class="kh">${hint}</span>`:''}</div>`;
    const header=`<div><h2 class="card-t">Monitoramento NEX</h2><p class="card-d">Rotas com flag NEX (XPT BRNMG → NEX, BRDMG → DC) — ${s.svc===ALL?"todos os SVCs":"SVC "+esc(s.svc)}</p></div>`;
    const filtro=`<div class="row" style="justify-content:flex-end"><label class="f"><span class="flbl">SVC</span>${selectHtml("svc",s.svc,FACILITIES,"Todos os SVCs")}</label></div>`;

    if(nex.length===0) return `<div class="stack">${header}${filtro}<div class="card pad muted" style="text-align:center">Nenhuma rota NEX ${s.svc===ALL?"na operação":"no SVC "+esc(s.svc)} no momento.</div></div>`;

    const summary=`<div class="kgrid">
      ${sk("Rotas NEX",fmtInt(nex.length),"brand",`${fmtPct(scopedAll.length?(nex.length/scopedAll.length)*100:0)} das ${fmtInt(scopedAll.length)}`)}
      ${sk("DS Momento",fmtPct(k.dsMomento),k.dsMomento>=META_DS?"success":"danger",`alcançável ${fmtPct(k.dsAlcancavel)}`)}
      ${sk("Falhas",fmtInt(k.notDelivered),"danger",`${fmtPct(k.falhasMomento)} do carregado`)}
      ${sk("Carregado",fmtInt(k.totalCarregado),"",`${fmtInt(k.delivered)} entregues`)}
      ${sk("BRNMG NEX",fmtInt(brnmg),"brand","rotas")}
      ${sk("BRDMG DC",fmtInt(brdmg),"","rotas")}
      ${sk("PNR",fmtInt(k.pnr),"warning","não roteirizados")}
      ${sk("Inativas",fmtInt(inativasRows.length),inativasRows.length>0?"danger":"success",`> ${INATIVIDADE_LIMIT_MIN}min`)}
    </div>`;

    const porFlag=[...groupRows(nex,r=>r.nexFlag).entries()].map(([k2,g])=>buildGroupKpi(k2,g)).sort((a,b)=>b.rotas-a.rotas);
    const flagTable=`<div class="card" style="overflow:hidden"><div class="card-h"><h3 class="card-t">Abertura por flag</h3><p class="card-d">BRNMG NEX e BRDMG DC</p></div>
      <div class="tscroll"><table><thead><tr><th>Flag</th><th class="r">Rotas</th><th class="r">Carregado</th><th class="r">Falhas</th><th class="r">DS Alcançável</th></tr></thead>
      <tbody>${porFlag.map(g=>`<tr><td>${flagBadge(g.key)}</td><td class="r num">${fmtInt(g.rotas)}</td><td class="r num">${fmtInt(g.totalCarregado)}</td><td class="r num ${g.notDelivered>0?'t-bad':'muted'}">${fmtInt(g.notDelivered)}</td><td class="r"><span class="badge ${dsBadgeClass(g.dsAlcancavel)} num">${fmtPct(g.dsAlcancavel)}</span></td></tr>`).join("")}</tbody></table></div></div>`;

    const porMlp=[...groupRows(nex,r=>r.mlpId).entries()].map(([k2,g])=>buildGroupKpi(k2,g)).sort((a,b)=>a.dsAlcancavel-b.dsAlcancavel);
