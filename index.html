    const mlpTable=`<div class="card" style="overflow:hidden"><div class="card-h"><h3 class="card-t">DS por transportadora (NEX)</h3><p class="card-d">Piores DS primeiro · meta ${fmtPct(META_DS)}</p></div>
      <div class="tscroll"><table><thead><tr><th>Transportadora</th><th class="r">Rotas</th><th class="r">Carregado</th><th class="r">Falhas</th><th class="r">Inativas</th><th class="r">DS Alcançável</th><th class="r">Status</th></tr></thead>
      <tbody>${porMlp.map(g=>`<tr${!g.atingiuMeta?' style="background:var(--danger-bg)"':''}><td style="font-weight:500">${esc(g.key)}</td><td class="r num">${fmtInt(g.rotas)}</td><td class="r num">${fmtInt(g.totalCarregado)}</td><td class="r num ${g.notDelivered>0?'t-bad':'muted'}">${fmtInt(g.notDelivered)}</td><td class="r num ${g.inativas>0?'t-bad':'muted'}">${fmtInt(g.inativas)}</td><td class="r"><span class="badge ${dsBadgeClass(g.dsAlcancavel)} num">${fmtPct(g.dsAlcancavel)}</span></td><td class="r"><span class="badge ${g.atingiuMeta?'b-good':'b-bad'}">${g.atingiuMeta?"Na meta":"Fora"}</span></td></tr>`).join("")}</tbody></table></div></div>`;

    // Abertura por XPT — colunas completas, ordenação por clique e expansão rota a rota.
    let porXpt=[...groupRows(nex,r=>(r.xpt||"—").toUpperCase()).entries()].map(([k2,g])=>{
      const o=buildGroupKpi(k2,g);
      o.xpt=k2; o.nexFlag=g[0].nexFlag;
      o.motoristas=new Set(g.map(r=>r.driverId)).size;
      o.routes=[...g].sort((a,b)=>a.dsAlcancavel-b.dsAlcancavel);
      return o;
    });
    const xsk=state.nex.xptSort, xsd=state.nex.xptDir;
    porXpt.sort((a,b)=>{ const av=a[xsk], bv=b[xsk]; let cmp; if(typeof av==="string"||typeof bv==="string") cmp=String(av==null?"":av).localeCompare(String(bv==null?"":bv)); else cmp=(av||0)-(bv||0); return xsd==="asc"?cmp:-cmp; });
    const xptTh=(label,key,align)=>{ const active=state.nex.xptSort===key; const arrow=active?(state.nex.xptDir==="asc"?"▲":"▼"):""; return `<th class="${align==='r'?'r ':''}sortable${active?' active':''}" data-sort-xpt="${key}">${esc(label)} <span class="sortarrow">${arrow}</span></th>`; };
    const xptRoutesTable=(routes)=>`<div class="tscroll" style="padding:4px 12px 10px"><table><thead><tr><th class="small">Rota</th><th class="small">SVC</th><th class="small">MLP</th><th class="small">Motorista</th><th class="small">Status</th><th class="r small">Carregado</th><th class="r small">Visitados</th><th class="r small">DS Alc.</th><th class="r small">Falhas</th><th class="r small">Inativo há</th></tr></thead>
      <tbody>${routes.map(r=>{ const crit=r.inatividadeMin>INATIVIDADE_CRITICA_MIN; const inativo=r.inatividadeMin>30 && r.status!=="FINALIZADA";
        return `<tr><td class="num small" style="font-weight:500">${esc(r.routeId)}</td><td class="small">${esc(r.facilityId)}</td><td class="muted small">${esc(r.mlpId)}</td><td class="mono small muted">${esc(r.driverId)}</td><td class="small">${STATUS_LABELS[r.status]||esc(r.status)}</td><td class="r num small">${fmtInt(r.totalCarregado)}</td><td class="r num small">${fmtPct(r.evolucaoRota)}</td><td class="r"><span class="badge ${dsBadgeClass(r.dsAlcancavel)} num">${fmtPct(r.dsAlcancavel)}</span></td><td class="r num small ${r.notDelivered>0?'t-bad':'muted'}">${fmtInt(r.notDelivered)}</td><td class="r num small ${inativo?(crit?'t-bad':'t-warn'):'muted'}">${inativo?fmtMinHHMM(r.inatividadeMin):"—"}</td></tr>`;
      }).join("")}</tbody></table></div>`;
    const xptRows=porXpt.map(x=>{
      const open=!!state.nex.xptOpen[x.xpt];
      const main=`<tr data-xpt-toggle="${esc(x.xpt)}" style="cursor:pointer"${open?' class="active-row"':''}><td class="muted" style="width:24px;text-align:center">${open?"▾":"▸"}</td><td class="num" style="font-weight:600">${esc(x.xpt)}</td><td>${flagBadge(x.nexFlag)}</td><td class="r num">${fmtInt(x.rotas)}</td><td class="r num">${fmtInt(x.motoristas)}</td><td class="r num">${fmtInt(x.totalCarregado)}</td><td class="r num">${fmtPct(x.evolucaoRota)}</td><td class="r num muted">${fmtPct(x.dsMomento)}</td><td class="r"><span class="badge ${dsBadgeClass(x.dsAlcancavel)} num">${fmtPct(x.dsAlcancavel)}</span></td><td class="r num ${x.notDelivered>0?'t-bad':'muted'}">${fmtInt(x.notDelivered)}</td><td class="r num">${fmtInt(x.pnr)}</td><td class="r num ${x.inativas>0?'t-bad':'muted'}">${fmtInt(x.inativas)}</td></tr>`;
      const expand=open?`<tr><td colspan="12" style="padding:0;background:var(--secondary)">${xptRoutesTable(x.routes)}</td></tr>`:"";
      return main+expand;
    }).join("");
    const xptTable=`<div class="card" style="overflow:hidden"><div class="card-h" style="display:flex;align-items:center;gap:8px"><h3 class="card-t">Abertura por XPT (BRNMG / BRDMG)</h3><span class="small muted" style="margin-left:auto">clique na coluna para ordenar · clique no XPT para abrir rota a rota</span></div>
      <div class="tscroll"><table><thead><tr><th style="width:24px"></th>${xptTh("XPT","xpt")}${xptTh("Flag","nexFlag")}${xptTh("Rotas","rotas","r")}${xptTh("Motoristas","motoristas","r")}${xptTh("Carregado","totalCarregado","r")}${xptTh("Visitados","evolucaoRota","r")}${xptTh("DS Mom.","dsMomento","r")}${xptTh("DS Alcanç.","dsAlcancavel","r")}${xptTh("Falhas","notDelivered","r")}${xptTh("PNR","pnr","r")}${xptTh("Inativas","inativas","r")}</tr></thead>
      <tbody>${porXpt.length===0?`<tr><td colspan="12" style="height:96px;text-align:center" class="muted">Nenhum XPT NEX no recorte</td></tr>`:xptRows}</tbody></table></div></div>`;

    // Drivers ofensores
    const drivers=[...groupRows(nex,r=>r.driverId).entries()].map(([driverId,g])=>{
      const tc=sum(g,"totalCarregado"), nd=sum(g,"notDelivered"), maxInat=g.reduce((m,r)=>Math.max(m,r.inatividadeMin),0);
      return { driverId, mlpId:g[0].mlpId, facilityId:g[0].facilityId, nexFlag:g[0].nexFlag, rotas:g.length, totalCarregado:tc, notDelivered:nd,
        dsAlcancavel: tc? round1(100-(nd/tc)*100):100, inatividadeMin:maxInat, inativo:maxInat>INATIVIDADE_LIMIT_MIN };
    }).filter(d=>d.inativo||d.dsAlcancavel<META_DS||d.notDelivered>0)
      .sort((a,b)=>(a.inativo!==b.inativo?(a.inativo?-1:1):0)||(a.dsAlcancavel-b.dsAlcancavel)||(b.notDelivered-a.notDelivered)).slice(0,15);
    const driverTable=drivers.length===0?"":`<div class="card" style="overflow:hidden"><div class="card-h"><h3 class="card-t">Motoristas ofensores (NEX)</h3><p class="card-d">Inativos, fora da meta ou com falhas — top 15</p></div>
      <div class="tscroll"><table><thead><tr><th>Motorista</th><th>Transportadora</th><th>SVC</th><th class="r">Rotas</th><th class="r">Falhas</th><th class="r">Inatividade</th><th class="r">DS Alcançável</th></tr></thead>
      <tbody>${drivers.map(d=>`<tr${d.inativo?' style="background:var(--danger-bg)"':''}><td class="mono small">${esc(d.driverId)}</td><td class="muted">${esc(d.mlpId)}</td><td>${esc(d.facilityId)}</td><td class="r num">${fmtInt(d.rotas)}</td><td class="r num ${d.notDelivered>0?'t-bad':'muted'}">${fmtInt(d.notDelivered)}</td><td class="r num ${d.inativo?'t-bad':'muted'}">${d.inativo?fmtMinHHMM(d.inatividadeMin):"—"}</td><td class="r"><span class="badge ${dsBadgeClass(d.dsAlcancavel)} num">${fmtPct(d.dsAlcancavel)}</span></td></tr>`).join("")}</tbody></table></div></div>`;

    const inativasTable=inativasRows.length===0?"":`<div class="card" style="overflow:hidden"><div class="card-h"><h3 class="card-t">Rotas inativas (NEX)</h3><p class="card-d">${fmtInt(inativasRows.length)} rotas sem atualização há mais de ${INATIVIDADE_LIMIT_MIN}min</p></div>
      <div class="tscroll"><table><thead><tr><th>Rota</th><th>Transportadora</th><th>SVC</th><th>Flag</th><th class="r">Carregado</th><th class="r">Inatividade</th><th class="r">DS</th></tr></thead>
      <tbody>${inativasRows.map(r=>`<tr style="background:var(--danger-bg)"><td class="num" style="font-weight:500">${esc(r.routeId)}</td><td class="muted">${esc(r.mlpId)}</td><td>${esc(r.facilityId)}</td><td>${flagBadge(r.nexFlag)}</td><td class="r num">${fmtInt(r.totalCarregado)}</td><td class="r num t-bad">${fmtMinHHMM(r.inatividadeMin)}</td><td class="r"><span class="badge ${dsBadgeClass(r.dsMomento)} num">${fmtPct(r.dsMomento)}</span></td></tr>`).join("")}</tbody></table></div></div>`;

    return `<div class="stack">${header}${filtro}${summary}
      <div class="twocol" style="grid-template-columns:1fr 1fr">${flagTable}${xptTable}</div>
      ${mlpTable}${driverTable}${inativasTable}</div>`;
  }

  // ===================== RENDER: DIT D0 =====================
  function routeStatusLabel(s){ return ROUTE_STATUS_LABEL[s] || (s||"—"); }
  // Barra horizontal (estilo Recharts vertical): label · barra · valor à direita.
  function ditHBar(items, colorFn){
    if(!items || items.length===0) return `<p class="loading">Nenhum dado no momento.</p>`;
    const max=Math.max(1,...items.map(i=>i.value));
    return `<div style="display:flex;flex-direction:column;gap:9px">`+items.map(it=>`
      <div style="display:grid;grid-template-columns:150px 1fr auto;gap:10px;align-items:center">
        <span class="small muted" title="${esc(it.label)}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(it.label)}</span>
        <div class="bartrack" style="height:12px"><div class="barfill" style="width:${(it.value/max)*100}%;background:${colorFn?colorFn(it):C_RISCO}"></div></div>
        <span class="num" style="font-weight:600;min-width:32px;text-align:right">${fmtInt(it.value)}</span>
      </div>`).join("")+`</div>`;
  }
  // Donut via conic-gradient com legenda.
  function ditDonut(parts){
    const total=parts.reduce((a,p)=>a+p.value,0);
    if(total===0) return `<p class="loading">Sem dados.</p>`;
    let acc=0; const stops=parts.filter(p=>p.value>0).map(p=>{ const a=(acc/total)*360; acc+=p.value; const b=(acc/total)*360; return `${p.color} ${a}deg ${b}deg`; }).join(",");
    return `<div style="display:flex;align-items:center;gap:22px;flex-wrap:wrap;justify-content:center">
      <div style="width:160px;height:160px;border-radius:50%;background:conic-gradient(${stops});-webkit-mask:radial-gradient(circle 46px at center,transparent 98%,#000 100%);mask:radial-gradient(circle 46px at center,transparent 98%,#000 100%)"></div>
      <div style="display:flex;flex-direction:column;gap:8px">${parts.filter(p=>p.value>0).map(p=>`<span class="small" style="display:flex;align-items:center;gap:8px"><span style="width:12px;height:12px;border-radius:3px;background:${p.color}"></span>${esc(p.name)}: <strong class="num">${fmtInt(p.value)}</strong> <span class="muted">(${fmtPct(total?(p.value/total)*100:0)})</span></span>`).join("")}</div>
    </div>`;
  }

  // -------- DIT · Gerencial --------
  function ditGerencial(){
    const k=DIT_PAYLOAD;
    const bs=(lbl,val,tone)=>`<div class="card bigstat"><span class="bl">${lbl}</span><span class="bv ${tone||''} num" style="color:${tone==='danger'?'var(--danger)':tone==='warning'?'#f59e0b':tone==='success'?'var(--success)':'var(--fg)'}">${val}</span></div>`;
    const bigs=`<div class="twocol" style="grid-template-columns:repeat(3,1fr)">${bs("Pendentes",fmtInt(k.pendente),"warning")}${bs("Pacotes sem risco",fmtInt(k.semRisco),"success")}${bs("Pacotes em risco",fmtInt(k.riscoDit),"danger")}</div>`;

    const svcResumo=FACILITIES.map(svc=>{ const list=k.rows.filter(r=>r.facilityId===svc); const total=list.length, risco=list.filter(r=>r.classificacao==="Risco DIT").length, pendente=list.filter(r=>r.classificacao==="Pendente").length; return {svc,total,risco,pendente,semRisco:total-risco-pendente}; });
    const svcCard=(d)=>{ if(d.total===0) return `<div class="card pad" style="border-style:dashed"><div class="row" style="justify-content:space-between"><span style="font-weight:600">${esc(d.svc)}</span></div><span class="small muted">Sem IDs de avaliação</span></div>`;
      const pr=(d.risco/d.total)*100, pp=(d.pendente/d.total)*100, ps=(d.semRisco/d.total)*100;
      const ln=(lbl,v,p,c)=>`<div class="row" style="justify-content:space-between"><span class="small muted" style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:2px;background:${c}"></span>${lbl}</span><span class="small num"><strong>${fmtInt(v)}</strong> <span class="muted">(${fmtPct(p)})</span></span></div>`;
      return `<div class="card pad"><div class="row" style="justify-content:space-between;margin-bottom:8px"><span style="font-weight:600">${esc(d.svc)}</span><span class="small muted num">${fmtInt(d.total)} pacotes</span></div>
        <div class="stack-bar" style="margin-bottom:10px"><div style="width:${ps}%;background:${C_SEMRISCO}"></div><div style="width:${pp}%;background:${C_PENDENTE}"></div><div style="width:${pr}%;background:${C_RISCO}"></div></div>
        <div style="display:flex;flex-direction:column;gap:6px">${ln("Em risco",d.risco,pr,C_RISCO)}${ln("Pendentes",d.pendente,pp,C_PENDENTE)}${ln("Sem risco",d.semRisco,ps,C_SEMRISCO)}</div></div>`; };
    const resumoSvc=`<div class="card pad"><h3 class="card-t">Resumo por Service Center</h3><p class="card-d">Pacotes por classificação em cada SVC, com o percentual sobre o total da unidade</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:14px">${svcResumo.map(svcCard).join("")}</div></div>`;

    const mini=(lbl,val)=>`<div class="card pad"><span class="small muted">${lbl}</span><div class="num" style="font-size:18px;font-weight:700;margin-top:4px">${val}</div></div>`;
    const minis=`<div class="twocol" style="grid-template-columns:repeat(4,1fr)">${mini("Envios monitorados",fmtInt(k.total))}${mini("Entregues",`${fmtInt(k.entregues)} (${fmtPct(k.pctEntregue)})`)}${mini("No prazo (on time)",fmtPct(k.pctOnTime))}${mini("Em atraso",fmtInt(k.delay))}</div>`;

    const donut=`<div class="card pad"><h3 class="card-t">Risco DIT</h3><p class="card-d">Distribuição dos envios por classificação</p><div style="margin-top:14px">${ditDonut([{name:"Sem Risco DIT",value:k.semRisco,color:C_SEMRISCO},{name:"Pendente",value:k.pendente,color:C_PENDENTE},{name:"Risco DIT",value:k.riscoDit,color:C_RISCO}])}</div></div>`;
    const ofensores=k.porMlp.filter(m=>m.riscoDit>0).slice(0,10).map(m=>({label:m.key,value:m.riscoDit}));
    const mlpRisco=`<div class="card pad"><h3 class="card-t">MLP com risco</h3><p class="card-d">Transportadoras com mais pacotes em risco (top 10)</p><div style="margin-top:14px">${ditHBar(ofensores)}</div></div>`;
    const motivos=`<div class="card pad"><h3 class="card-t">Motivos dos pacotes em risco</h3><p class="card-d">Sub-status dos envios classificados como Risco DIT</p><div style="margin-top:14px">${ditHBar(k.motivosRisco.slice(0,12))}</div></div>`;
    const pendSvc=`<div class="card pad"><h3 class="card-t">Pendentes por SVC</h3><p class="card-d">Envios pendentes por Service Center</p><div style="margin-top:14px">${ditHBar(k.pendentesPorSvc,()=>C_PENDENTE)}</div></div>`;

    return `<div class="stack">${bigs}${resumoSvc}${minis}<div class="twocol" style="grid-template-columns:1fr 1fr">${donut}${mlpRisco}</div><div class="twocol" style="grid-template-columns:1fr 1fr">${motivos}${pendSvc}</div></div>`;
  }

  // -------- DIT · Crítico --------
  function ditCritico(){
    const s=state.dit;
    const risco=DIT_PAYLOAD.rows.filter(r=>r.classificacao==="Risco DIT" && (s.critSvc===ALL||r.facilityId===s.critSvc));
    const byRoute=new Map();
    for(const r of risco){ const key=`${r.facilityId}__${r.routeId}`; const a=byRoute.get(key)||[]; a.push(r); byRoute.set(key,a); }
    let rotas=[];
    for(const [key,list] of byRoute.entries()){ const first=list[0]; const rev=list.filter(r=>DIT_REVERSIVEIS.has(r.subStatus)); const mm=new Map(); for(const r of rev) mm.set(r.subStatus,(mm.get(r.subStatus)||0)+1);
      rotas.push({key,routeId:first.routeId||"—",mlp:first.mlp,facilityId:first.facilityId,driverId:first.driverId,plate:first.plate,vehicleType:first.vehicleType,routeStatus:first.routeStatus,emRota:first.routeStatus==="active",emRisco:list.length,reversiveis:rev.length,motivos:[...mm.entries()].map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value)}); }
    rotas=rotas.filter(r=>r.reversiveis>0).sort((a,b)=>(Number(b.emRota)-Number(a.emRota))||(b.reversiveis-a.reversiveis)||(b.emRisco-a.emRisco));

    const totalRev=rotas.reduce((a,r)=>a+r.reversiveis,0), revEmRota=rotas.filter(r=>r.emRota).reduce((a,r)=>a+r.reversiveis,0), revNoSvc=totalRev-revEmRota, rotasEmRota=rotas.filter(r=>r.emRota).length;
    const topRotas=rotas.slice(0,12).map(r=>({label:`${r.routeId} · ${r.mlp.length>12?r.mlp.slice(0,11)+"…":r.mlp}`,value:r.reversiveis,emRota:r.emRota}));
    const mlpMap=new Map(); for(const r of rotas) mlpMap.set(r.mlp,(mlpMap.get(r.mlp)||0)+r.reversiveis);
    const mlpAcionar=[...mlpMap.entries()].map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,10);

    const nota=`<div class="card pad" style="border-color:rgba(245,158,11,.4);background:var(--warning-bg)"><p class="small" style="margin:0"><strong>Pacotes reversíveis</strong> = em Risco DIT com motivo de reentrega (Cliente Ausente, Comercial Fechado, Endereço não visitado). Priorize as rotas ainda <strong>em rota</strong> — o motorista está na rua e pode reverter agora.</p></div>`;
    const filtro=`<div class="row" style="justify-content:flex-end"><label class="f"><span class="flbl">SVC</span>${selectHtml("critSvc",s.critSvc,DIT_PAYLOAD.facilities,"Todos os SVCs")}</label></div>`;
    const bs=`<div class="twocol" style="grid-template-columns:repeat(3,1fr)">
      <div class="card bigstat"><span class="bl">Pacotes reversíveis</span><span class="bv num" style="color:var(--danger)">${fmtInt(totalRev)}</span></div>
      <div class="card bigstat"><span class="bl">Em rota agora (ação imediata)</span><span class="bv num" style="color:var(--danger)">${fmtInt(revEmRota)}</span><span class="small muted">${fmtInt(rotasEmRota)} rotas ativas</span></div>
      <div class="card bigstat"><span class="bl">No SVC (recuperar)</span><span class="bv num" style="color:#f59e0b">${fmtInt(revNoSvc)}</span><span class="small muted">rota fechada / retornada</span></div></div>`;
    const charts=`<div class="twocol" style="grid-template-columns:1fr 1fr">
      <div class="card pad"><h3 class="card-t">Top rotas a reverter</h3><p class="card-d">Mais pacotes reversíveis — vermelho = em rota (ação imediata)</p><div style="margin-top:14px">${ditHBar(topRotas,(it)=>it.emRota?C_RISCO:C_PENDENTE)}</div></div>
      <div class="card pad"><h3 class="card-t">MLPs a acionar</h3><p class="card-d">Transportadoras com mais pacotes reversíveis (top 10)</p><div style="margin-top:14px">${ditHBar(mlpAcionar)}</div></div></div>`;

    const rowsHtml=rotas.length===0?`<tr><td colspan="9" style="height:120px;text-align:center" class="muted">Nenhuma rota com pacotes reversíveis nos filtros atuais.</td></tr>`:
      rotas.slice(0,60).map(r=>`<tr${r.emRota?' style="background:var(--danger-bg)"':''}>
        <td>${r.emRota?'<span class="badge b-bad">Ação imediata</span>':'<span class="badge b-warn">Recuperar no SVC</span>'}</td>
        <td class="num" style="font-weight:500">${esc(r.routeId)}</td><td>${esc(r.facilityId)}</td><td>${esc(r.mlp)}</td>
        <td class="small muted"><span class="num" style="font-weight:500;color:var(--fg)">${esc(r.driverId||"—")}</span> · ${esc(r.plate||"—")}</td>
        <td class="muted">${esc(r.vehicleType)}</td><td class="r num t-bad" style="font-weight:600">${fmtInt(r.reversiveis)}</td><td class="r num muted">${fmtInt(r.emRisco)}</td>
        <td><div style="display:flex;flex-wrap:wrap;gap:4px">${r.motivos.map(m=>`<span class="badge" style="font-size:10px;font-weight:400">${esc(m.label)} ${m.value}</span>`).join("")}</div></td></tr>`).join("");
    const table=`<div class="card" style="overflow:hidden"><div class="card-h"><h3 class="card-t">Fila de ação — rotas a reverter</h3><p class="card-d">${fmtInt(rotas.length)} rotas com pacotes reversíveis, priorizadas por urgência</p></div>
      <div class="tscroll"><table><thead><tr><th>Prioridade</th><th>Rota</th><th>SVC</th><th>Transportadora</th><th>Driver / Placa</th><th>Modal</th><th class="r">Reversíveis</th><th class="r">Em risco</th><th>Motivos</th></tr></thead><tbody>${rowsHtml}</tbody></table></div></div>`;

    return `<div class="stack"><div class="row" style="justify-content:space-between;align-items:flex-start">${nota}${filtro}</div>${bs}${charts}${table}</div>`;
  }

  // -------- DIT · Abertura por IDs (drill-down MLP → Rota → Pacote) --------
  function ditAbertura(){
    const s=state.dit;
    const termo=s.busca.trim().toLowerCase();
    const filtered=DIT_PAYLOAD.rows.filter(r=>{
      if(s.svc!==ALL && r.facilityId!==s.svc) return false;
      if(s.mlp!==ALL && r.mlp!==s.mlp) return false;
      if(s.classe!==ALL && r.classificacao!==s.classe) return false;
      if(termo){ const hay=`${r.shipmentId} ${r.routeId} ${r.driverId} ${r.plate}`.toLowerCase(); if(!hay.includes(termo)) return false; }
      return true;
    });
    const byMlp=new Map();
    for(const r of filtered){ const a=byMlp.get(r.mlp)||[]; a.push(r); byMlp.set(r.mlp,a); }
    let groups=[];
    for(const [mlp,list] of byMlp.entries()){ const byRoute=new Map(); for(const r of list){ const a=byRoute.get(r.routeId)||[]; a.push(r); byRoute.set(r.routeId,a); }
      const routes=[...byRoute.entries()].map(([routeId,ships])=>({routeId,plate:ships[0].plate,vehicleType:ships[0].vehicleType,driverId:ships[0].driverId,routeStatus:ships[0].routeStatus,shipments:ships})).sort((a,b)=>b.shipments.length-a.shipments.length);
      groups.push({mlp,total:list.length,facilities:[...new Set(list.map(r=>r.facilityId))].sort(),routes}); }
    groups.sort((a,b)=>b.total-a.total);

    const filtros=`<div class="card-h" style="display:flex;flex-direction:column;gap:12px">
      <div class="row" style="justify-content:space-between;align-items:flex-end"><div><h3 class="card-t">Abertura por IDs</h3><p class="card-d">${fmtInt(filtered.length)} pacotes · ${fmtInt(groups.length)} transportadoras — abra MLP → rota → pacote para investigar a baixa</p></div>
      <label class="f"><input type="text" data-bind="busca" value="${esc(s.busca)}" placeholder="Buscar pacote, rota, motorista, placa…"></label></div>
      <div class="row">
        <label class="f"><span class="flbl">SVC</span>${selectHtml("svc",s.svc,DIT_PAYLOAD.facilities,"Todos os SVCs")}</label>
        <label class="f"><span class="flbl">Transportadora</span>${selectHtml("mlp",s.mlp,DIT_PAYLOAD.mlps,"Todas as transportadoras")}</label>
        <label class="f"><span class="flbl">Classificação DIT</span>${selectHtml("classe",s.classe,DIT_CLASSES,"Todas as classificações")}</label>
      </div></div>`;

    let body;
    if(groups.length===0){ body=`<p style="padding:40px;text-align:center" class="muted small">Nenhum pacote encontrado com os filtros atuais.</p>`; }
    else { body=groups.map(g=>{
      const mlpOpen=!!s.openMlp[g.mlp];
      const head=`<button type="button" class="drill-row" data-mlp-toggle="${esc(g.mlp)}"><span class="drill-caret${mlpOpen?' open':''}">▸</span><span style="flex:1;font-weight:600">${esc(g.mlp)}</span><span class="small muted" style="margin-right:6px">${g.facilities.join(" · ")}</span><span class="badge num">${fmtInt(g.total)} pacotes</span><span class="badge num">${fmtInt(g.routes.length)} rotas</span></button>`;
      let routesHtml="";
      if(mlpOpen){ routesHtml=g.routes.map(rt=>{ const rkey=`${g.mlp}__${rt.routeId}`; const rOpen=!!s.openRoute[rkey];
        const rhead=`<button type="button" class="drill-row drill-route" data-route-toggle="${esc(rkey)}"><span class="drill-caret${rOpen?' open':''}" style="width:13px">▸</span><span class="num" style="font-weight:500">${esc(rt.routeId||"—")}</span><span class="small muted">Placa <span style="color:var(--fg);font-weight:500">${esc(rt.plate||"—")}</span></span><span class="small muted">${esc(rt.vehicleType)}</span><span class="small muted">Driver <span style="color:var(--fg);font-weight:500">${esc(rt.driverId||"—")}</span></span><span class="badge" style="font-size:10px">${esc(routeStatusLabel(rt.routeStatus))}</span><span class="small muted num" style="margin-left:auto">${fmtInt(rt.shipments.length)} pacotes</span></button>`;
        let ships="";
        if(rOpen){ ships=`<div class="tscroll" style="padding-left:30px"><table><thead><tr><th>Pacote</th><th>Status / baixa</th><th>Classificação</th><th>Endereço</th><th>Prazo</th><th>Último check</th></tr></thead>
          <tbody>${rt.shipments.map(sp=>{ const cls=sp.classificacao==="Risco DIT"?"b-bad":sp.classificacao==="Pendente"?"b-warn":"b-good";
            return `<tr${sp.classificacao==="Risco DIT"?' style="background:var(--danger-bg)"':''}><td class="mono small">${esc(sp.shipmentId)}</td><td class="muted small">${esc(sp.subStatus)}</td><td><span class="badge ${cls}">${esc(sp.classificacao)}</span></td><td class="muted small">${esc(sp.addressType)}</td><td class="muted small">${esc(sp.promise||"—")}</td><td class="muted small num">${esc(sp.lastCheck||"—")}</td></tr>`;
          }).join("")}</tbody></table></div>`; }
        return rhead+ships;
      }).join(""); }
      return `<div>${head}${routesHtml}</div>`;
    }).join(""); }

    return `<div class="stack"><div class="card" style="overflow:hidden">${filtros}${body}</div></div>`;
  }

  function renderDit(){
    if(!DIT_LOADED) return `<div class="loading">Carregando dados de DIT D0…</div>`;
    if(DIT_ERROR||!DIT_PAYLOAD) return `<div class="errbox">Falha ao carregar DIT D0: ${esc(DIT_ERROR||"sem dados")}.</div>`;
    const sub=state.dit.sub;
    const tabBtn=(id,label)=>`<button type="button" class="subtab" data-dit-sub="${id}" aria-selected="${sub===id?'true':'false'}">${label}</button>`;
    const tabs=`<div class="subtabs">${tabBtn("gerencial","Gerencial")}${tabBtn("critico","Crítico")}${tabBtn("abertura","Abertura por IDs")}</div>`;
    const content=sub==="critico"?ditCritico():sub==="abertura"?ditAbertura():ditGerencial();
    return `<div class="stack"><div><h2 class="card-t">DIT D0 — risco de estouro de prazo</h2><p class="card-d">Cada linha é um envio (shipment). Classificação: Risco DIT, Pendente ou Sem Risco DIT.</p></div>${tabs}${content}</div>`;
  }

  // ===================== RENDER: ROTAS NÃO FINALIZADAS =====================
  function renderNaoFinalizadas(){
    const s=state["nao-finalizadas"];
    const scoped = s.svc===ALL ? UNFINISHED_ROWS : UNFINISHED_ROWS.filter(r=>r.facilityId===s.svc);
    const header=`<div><h2 class="card-t">Rotas não finalizadas</h2><p class="card-d">Rotas de dias anteriores que iniciaram antes de hoje e ainda não têm fechamento (CLOSE_DATE) — ${s.svc===ALL?"todos os SVCs":"SVC "+esc(s.svc)}</p></div>`;
    const filtro=`<div class="row" style="justify-content:flex-end"><label class="f"><span class="flbl">SVC</span>${selectHtml("svc",s.svc,FACILITIES,"Todos os SVCs")}</label></div>`;

    if(UNFINISHED_ROWS.length===0) return `<div class="stack">${header}<div class="card pad muted" style="text-align:center">Nenhuma rota pendente de dias anteriores. Todas as rotas anteriores foram fechadas.</div></div>`;
    if(scoped.length===0) return `<div class="stack">${header}${filtro}<div class="card pad muted" style="text-align:center">Nenhuma rota não finalizada no SVC ${esc(s.svc)}.</div></div>`;

    const k=kpiFull(scoped);
    const inatMedia = scoped.length? scoped.reduce((a,r)=>a+r.inatividadeMin,0)/scoped.length:0;
    const nexCount = scoped.filter(r=>r.nexFlag!==null).length;

    const sk=(lbl,val,tone,hint)=>`<div class="kc"><span class="kl">${lbl}</span><span class="kv ${tone||''} num">${val}</span>${hint?`<span class="kh">${hint}</span>`:''}</div>`;
    const summary=`<div class="kgrid" style="grid-template-columns:repeat(2,1fr)">
      ${sk("Rotas não finalizadas",fmtInt(scoped.length),"danger",`${fmtInt(nexCount)} NEX/DC`)}
      ${sk("Pacotes parados",fmtInt(k.pendente),"warning",`de ${fmtInt(k.totalCarregado)} carregados`)}
      ${sk("DS Alcançável",fmtPct(k.dsAlcancavel),k.dsAlcancavel>=META_DS?"success":"danger",`${fmtInt(k.notDelivered)} falhas`)}
      ${sk("Inatividade média",fmtDuracao(inatMedia),"danger","sem atualização")}
    </div>`;

    const porMlp=[...groupRows(scoped,r=>r.mlpId).entries()].map(([mlpId,g])=>{
      const o=buildGroupKpi(mlpId,g); o.pendentes=Math.max(0,o.totalCarregado-o.delivered-o.notDelivered);
      o.nex=g.filter(r=>r.nexFlag!==null).length; o.inatMedia=g.reduce((a,r)=>a+r.inatividadeMin,0)/g.length; return o;
    }).sort((a,b)=>b.pendentes-a.pendentes);
    const mlpTable=`<div class="card" style="overflow:hidden"><div class="card-h"><h3 class="card-t">Abertura por MLP</h3><p class="card-d">Rotas não finalizadas por transportadora</p></div>
      <div class="tscroll"><table><thead><tr><th>Transportadora</th><th class="r">Rotas</th><th class="r">NEX/DC</th><th class="r">Carregado</th><th class="r">Pendentes</th><th class="r">Falhas</th><th class="r">DS Alcançável</th><th class="r">Inatividade méd.</th></tr></thead>
      <tbody>${porMlp.map(g=>`<tr><td style="font-weight:500">${esc(g.key)}</td><td class="r num">${fmtInt(g.rotas)}</td><td class="r num">${fmtInt(g.nex)}</td><td class="r num">${fmtInt(g.totalCarregado)}</td><td class="r num t-warn">${fmtInt(g.pendentes)}</td><td class="r num ${g.notDelivered>0?'t-bad':'muted'}">${fmtInt(g.notDelivered)}</td><td class="r"><span class="badge ${dsBadgeClass(g.dsAlcancavel)} num">${fmtPct(g.dsAlcancavel)}</span></td><td class="r num muted">${fmtDuracao(g.inatMedia)}</td></tr>`).join("")}</tbody></table></div></div>`;

    const ordenadas=[...scoped].sort((a,b)=>b.inatividadeMin-a.inatividadeMin);
    const detail=`<div class="card" style="overflow:hidden"><div class="card-h"><h3 class="card-t">Detalhe das rotas não finalizadas</h3><p class="card-d">${fmtInt(scoped.length)} rotas · ordenadas por inatividade</p></div>
      <div class="tscroll"><table><thead><tr><th>Rota</th><th>SVC</th><th>Transportadora</th><th>Ciclo</th><th>Flag</th><th class="r">Início</th><th class="r">Carregado</th><th class="r">Pendentes</th><th class="r">DS Mom.</th><th class="r">DS Alc.</th><th class="r">ORH</th><th class="r">Inatividade</th></tr></thead>
      <tbody>${ordenadas.map(r=>{ const pend=Math.max(0,r.totalCarregado-r.delivered-r.notDelivered); const crit=r.inatividadeMin>INATIVIDADE_CRITICA_MIN;
        return `<tr${crit?' style="background:var(--danger-bg)"':''}><td class="num" style="font-weight:500">${esc(r.routeId)}</td><td>${esc(r.facilityId)}</td><td class="muted">${esc(r.mlpId)}</td><td class="muted">${esc(r.cycle)}</td><td>${flagBadge(r.nexFlag)}</td><td class="r mono small muted">${esc(fmtDataHora(r.initialDateMs))}</td><td class="r num">${fmtInt(r.totalCarregado)}</td><td class="r num t-warn">${fmtInt(pend)}</td><td class="r"><span class="badge ${dsBadgeClass(r.dsMomento)} num">${fmtPct(r.dsMomento)}</span></td><td class="r num">${fmtPct(r.dsAlcancavel)}</td><td class="r mono small muted">${esc(r.orhHHMM)}</td><td class="r num ${crit?'t-bad':'muted'}">${fmtDuracao(r.inatividadeMin)}</td></tr>`;
      }).join("")}</tbody></table></div></div>`;

    return `<div class="stack">${header}${filtro}${summary}${mlpTable}${detail}</div>`;
  }

  // ===================== RENDER: RESUMO OPERACIONAL =====================
  function renderResumo(){
    const ditRows = (DIT_PAYLOAD && DIT_PAYLOAD.rows) ? DIT_PAYLOAD.rows : [];
    const routes = ALL_ROWS;
    const MIN_VOL=30;
    const REVERSIVEIS=new Set(["Cliente Ausente","Comercial Fechado","Endereço não visitado"]);

    const temRotas=routes.length>0;
    const k = temRotas? kpiFull(routes):null;
    const gapMeta = k? round1(k.dsAlcancavel-META_DS):0;
    const atingiu = k? k.dsAlcancavel>=META_DS:false;
    const impactosDs = temRotas? computeFailureReasons(routes).filter(f=>f.total>0).slice(0,6):[];
    const ofensorMotivo = temRotas? computeFailureOffenders(routes).filter(f=>f.total>0&&f.topMlp).slice(0,5):[];
    const mlpRanking = temRotas? computeMlpRanking(routes):[];
    const dsComVol = mlpRanking.filter(m=>m.totalCarregado>=MIN_VOL);
    const ofensoresDs=[...dsComVol].sort((a,b)=>a.dsMomento-b.dsMomento).slice(0,3);
    const melhoresDs=[...dsComVol].sort((a,b)=>b.dsMomento-a.dsMomento).slice(0,3);
    const modalRank = temRotas? computeGroupRanking(routes,"vehicleType"):[];
    const modaisDs = modalRank.filter(m=>m.totalCarregado>=MIN_VOL&&m.notDelivered>0).sort((a,b)=>a.dsMomento-b.dsMomento).slice(0,5);
    const ambAbertas = routes.filter(r=>r.isAmbulancia&&r.status!=="FINALIZADA").length;
    const ambTotal = routes.filter(r=>r.isAmbulancia).length;
    const pnrTotal = routes.reduce((a,r)=>a+r.pnr,0);
    const pnrRotas = routes.filter(r=>r.pnr>0).length;

    const total=ditRows.length, entregues=ditRows.filter(r=>ENTREGUE_SUB.has(r.subStatus)).length,
      risco=ditRows.filter(r=>r.classificacao==="Risco DIT").length;
    const pctRisco= total? (risco/total)*100:0;
    const mlpMap=new Map();
    for(const r of ditRows){ if(!r.mlp||r.mlp==="—") continue; let m=mlpMap.get(r.mlp); if(!m){ m={mlp:r.mlp,total:0,entregues:0,risco:0,reversiveis:0}; mlpMap.set(r.mlp,m);} m.total++; if(ENTREGUE_SUB.has(r.subStatus)) m.entregues++; if(r.classificacao==="Risco DIT"){ m.risco++; if(REVERSIVEIS.has(r.subStatus)) m.reversiveis++; } }
    const mlpsDit=[...mlpMap.values()].map(m=>({...m,pctEntregue:m.total?(m.entregues/m.total)*100:0}));
    const ofensoresDit=[...mlpsDit].filter(m=>m.risco>0).sort((a,b)=>b.risco-a.risco).slice(0,3);
    const melhorDit=[...mlpsDit].filter(m=>m.total>=MIN_VOL).sort((a,b)=>b.pctEntregue-a.pctEntregue).slice(0,3);
    const maisReverter=[...mlpsDit].filter(m=>m.reversiveis>0).sort((a,b)=>b.reversiveis-a.reversiveis).slice(0,3);
    const clusterMap=new Map();
    for(const r of ditRows){ if(r.classificacao!=="Risco DIT") continue; const c=r.cluster||"—"; if(c==="—") continue; clusterMap.set(c,(clusterMap.get(c)||0)+1); }
    const clusters=[...clusterMap.entries()].map(([cluster,risco])=>({cluster,risco})).sort((a,b)=>b.risco-a.risco).slice(0,5);

    // Consolidado piores MLPs
    const consMap=new Map();
    for(const m of dsComVol){ if(m.dsMomento>=META_DS) continue; consMap.set(m.mlpId,{mlp:m.mlpId,ds:m.dsMomento,gap:round1(m.dsMomento-META_DS),falhas:m.notDelivered,ditRisco:0}); }
    for(const m of mlpsDit){ if(m.risco<=0) continue; const ex=consMap.get(m.mlp); if(ex) ex.ditRisco=m.risco; else consMap.set(m.mlp,{mlp:m.mlp,ds:null,gap:null,falhas:0,ditRisco:m.risco}); }
    const piores=[...consMap.values()].sort((a,b)=>(b.falhas+b.ditRisco)-(a.falhas+a.ditRisco)).slice(0,5);

    if(!temRotas && total===0) return `<div class="card pad muted" style="text-align:center">Sem dados de rotas nem de DIT D0 para o resumo.</div>`;

    const sk=(lbl,val,tone,hint)=>`<div class="kc"><span class="kl">${lbl}</span><span class="kv ${tone||''} num">${val}</span>${hint?`<span class="kh">${hint}</span>`:''}</div>`;
    const summary=`<div class="kgrid">
      ${sk("DS Momento",k?fmtPct(k.dsMomento):"—","brand",k?`${fmtInt(k.delivered)} entregues`:"")}
      ${sk("DS Alcançável",k?fmtPct(k.dsAlcancavel):"—",k?(atingiu?"success":"danger"):"",k?`meta ${fmtPct(META_DS)} · ${gapMeta>=0?"+":""}${fmtDec(gapMeta)} pp`:"")}
      ${sk("Clientes visitados",k?fmtPct(k.evolucaoRota):"—","brand",k?`${fmtInt(k.delivered+k.notDelivered)} de ${fmtInt(k.totalCarregado)}`:"")}
      ${sk("Falhas",k?fmtInt(k.notDelivered):"—","danger",k?`${fmtPct(k.falhasMomento)} do carregado`:"")}
      ${sk("Ambulâncias abertas",temRotas?fmtInt(ambAbertas):"—",ambAbertas>0?"danger":"success",`de ${fmtInt(ambTotal)} no total`)}
      ${sk("PNR abertas",temRotas?fmtInt(pnrTotal):"—",pnrTotal>0?"danger":"success",`em ${fmtInt(pnrRotas)} rotas`)}
      ${sk("DIT não revertido",total?fmtInt(risco):"Sem DIT",total?`${fmtPct(pctRisco)} de ${fmtInt(total)}`:"operação encerrada",)}
      ${sk("Rotas",temRotas?fmtInt(k.rotas):"—","","na operação")}
    </div>`;

    const rankCard=(title,desc,items,emptyMsg)=>`<div class="card pad"><h3 class="card-t">${title}</h3><p class="card-d">${desc}</p>
      <div style="margin-top:12px;display:flex;flex-direction:column;gap:10px">${items.length===0?`<p class="muted small">${emptyMsg||"Sem dados."}</p>`:items.map((it,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <span style="display:flex;align-items:center;gap:8px;min-width:0"><span class="rank">${i+1}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(it.label)}</span></span>
        <span style="text-align:right;min-width:0"><div class="num ${it.tone==='danger'?'t-bad':it.tone==='success'?'t-good':''}" style="font-weight:600">${esc(it.value)}</div>${it.sub?`<div class="small muted">${esc(it.sub)}</div>`:""}</span></div>`).join("")}</div></div>`;

    const consolidado=piores.length===0?"":`<div class="card pad danger-card"><h3 class="card-t">Consolidado — piores MLPs para cobrar evolução</h3><p class="card-d">Cruzamento de ofensores de DS (abaixo da meta) com ofensores DIT (não revertidos)</p>
      <div class="tscroll" style="margin-top:12px"><table><thead><tr><th>Transportadora</th><th class="r">DS Alcançável</th><th class="r">Gap meta</th><th class="r">Falhas</th><th class="r">DIT em risco</th></tr></thead>
      <tbody>${piores.map(m=>`<tr><td style="font-weight:500">${esc(m.mlp)}</td><td class="r num">${m.ds!=null?fmtPct(m.ds):"—"}</td><td class="r num ${m.gap!=null&&m.gap<0?'t-bad':'muted'}">${m.gap!=null?(m.gap>=0?"+":"")+fmtDec(m.gap)+" pp":"—"}</td><td class="r num ${m.falhas>0?'t-bad':'muted'}">${fmtInt(m.falhas)}</td><td class="r num ${m.ditRisco>0?'t-bad':'muted'}">${fmtInt(m.ditRisco)}</td></tr>`).join("")}</tbody></table></div></div>`;

    const dsCards=`<div class="twocol" style="grid-template-columns:1fr 1fr">
      ${rankCard("Impactos em DS (motivos de falha)","Motivos de não entrega que mais derrubam o DS",impactosDs.map(f=>({label:f.label,value:fmtInt(f.total)+" falhas",sub:fmtPct(f.pct)+" do total",tone:"danger"})),"Sem base de rotas")}
      ${rankCard("Ofensor por motivo de falha","Transportadora que mais contribui em cada motivo",ofensorMotivo.map(f=>({label:f.label,value:f.topMlp||"—",sub:fmtInt(f.topMlpTotal)+" de "+fmtInt(f.total),tone:"danger"})),"Sem base de rotas")}
      ${rankCard("Ofensores de DS (MLP)","Piores parceiros por DS — mín. "+MIN_VOL+" pacotes",ofensoresDs.map(m=>({label:m.mlpId,value:fmtPct(m.dsMomento),sub:"gap "+(round1(m.dsMomento-META_DS)>=0?"+":"")+fmtDec(round1(m.dsMomento-META_DS))+" pp · "+fmtInt(m.rotas)+" rotas",tone:"danger"})),"Sem base de rotas")}
      ${rankCard("Melhor DS (MLP)","Parceiros com melhor Delivery Success — mín. "+MIN_VOL+" pacotes",melhoresDs.map(m=>({label:m.mlpId,value:fmtPct(m.dsMomento),sub:(m.atingiuMeta?"na meta":"fora da meta")+" · "+fmtInt(m.rotas)+" rotas",tone:"success"})),"Sem base de rotas")}
      ${rankCard("DS por modal (ofensores)","Modais com pior Delivery Success",modaisDs.map(m=>({label:m.key,value:fmtPct(m.dsMomento),sub:fmtInt(m.notDelivered)+" falhas · "+fmtInt(m.rotas)+" rotas",tone:"danger"})),"Sem base de rotas")}
    </div>`;

    const ditCards=`<div class="twocol" style="grid-template-columns:1fr 1fr">
      ${rankCard("Ofensores de DIT (MLP)","Parceiros com mais pacotes não revertidos",ofensoresDit.map(m=>({label:m.mlp,value:fmtInt(m.risco)+" não revertidos",sub:fmtPct(m.pctEntregue)+" aproveit.",tone:"danger"})),"Sem DIT na rua")}
      ${rankCard("Melhor aproveitamento DIT (MLP)","Maior % de entregas — mín. "+MIN_VOL+" pacotes",melhorDit.map(m=>({label:m.mlp,value:fmtPct(m.pctEntregue),sub:fmtInt(m.total)+" pacotes",tone:"success"})),"Sem DIT na rua")}
      ${rankCard("Maior volume a reverter (MLP)","Pacotes reversíveis ainda não revertidos",maisReverter.map(m=>({label:m.mlp,value:fmtInt(m.reversiveis)+" reversíveis",sub:fmtInt(m.risco)+" não revertidos",tone:"danger"})),"Sem DIT na rua")}
      ${rankCard("Clusters ofensores (DIT)","Regiões com mais pacotes não revertidos",clusters.map(c=>({label:c.cluster,value:fmtInt(c.risco)+" não revertidos",tone:"danger"})),"Sem DIT na rua")}
    </div>`;

    const ditNota = !DIT_LOADED ? `<p class="small muted">Carregando ofensores DIT…</p>` : "";

    return `<div class="stack">
      <div><h2 class="card-t" style="font-size:18px">Fechamento operacional — foco em DS</h2><p class="card-d">Delivery Success e seus impactos, com a visão complementar de ofensores DIT</p></div>
      ${summary}
      ${consolidado}
      <div><h3 class="card-t">Delivery Success</h3></div>
      ${dsCards}
      <div><h3 class="card-t">Ofensores DIT (complementar)</h3></div>
      ${ditNota}${ditCards}
      <p class="small muted">Nota: o DS e seus impactos vêm da base de Rotas (meta de DS ${fmtPct(META_DS)}). Os ofensores DIT são uma foto do momento; usa-se aproveitamento (entregues ÷ total) como proxy de sucesso.</p>
    </div>`;
  }

  // ===================== WIRING =====================
  function render(){
    document.getElementById("tab-svc").innerHTML = renderSvc();
    document.getElementById("tab-mlp").innerHTML = renderMlp();
    document.getElementById("tab-rotas").innerHTML = renderRotas();
    document.getElementById("tab-critico").innerHTML = renderCritico();
    document.getElementById("tab-kpis").innerHTML = renderKpis();
    document.getElementById("tab-ambulancias").innerHTML = renderAmbulancias();
    document.getElementById("tab-nex").innerHTML = renderNex();
    document.getElementById("tab-dit").innerHTML = renderDit();
    document.getElementById("tab-nao-finalizadas").innerHTML = renderNaoFinalizadas();
    document.getElementById("tab-resumo").innerHTML = renderResumo();
    bindControls();
  }

  function bindControls(){
    document.querySelectorAll(".tabpanel").forEach(panel=>{
      const tab = panel.id.replace("tab-","");
      panel.querySelectorAll("[data-bind]").forEach(el=>{
        const key=el.getAttribute("data-bind");
        if(el.tagName==="INPUT"){
          el.oninput=()=>{ state[tab][key]=el.value; const pos=el.selectionStart; render(); /* keep focus on busca */
            const again=document.querySelector(`#tab-${tab} [data-bind="${key}"]`); if(again){ again.focus(); again.selectionStart=again.selectionEnd=pos; } };
        } else {
          el.onchange=()=>{ state[tab][key]=el.value;
            // Mudar filtro de SVC/MLP/Classificação na Abertura recolhe o drill-down.
            if(tab==="dit" && (key==="svc"||key==="mlp"||key==="classe")){ state.dit.openMlp={}; state.dit.openRoute={}; }
            render(); };
        }
      });
      // DIT: troca de sub-aba (Gerencial / Crítico / Abertura por IDs)
      panel.querySelectorAll("[data-dit-sub]").forEach(el=>{
        el.onclick=()=>{ state.dit.sub=el.getAttribute("data-dit-sub"); render(); };
      });
      // DIT: drill-down MLP e Rota na Abertura por IDs
      panel.querySelectorAll("[data-mlp-toggle]").forEach(el=>{
        const key=el.getAttribute("data-mlp-toggle");
        el.onclick=()=>{ state.dit.openMlp[key]=!state.dit.openMlp[key]; render(); };
      });
      panel.querySelectorAll("[data-route-toggle]").forEach(el=>{
        const key=el.getAttribute("data-route-toggle");
        el.onclick=()=>{ state.dit.openRoute[key]=!state.dit.openRoute[key]; render(); };
      });
      // Seleção de SVC (cards clicáveis na aba Evolução SVC)
      panel.querySelectorAll("[data-svc]").forEach(el=>{
        const fid=el.getAttribute("data-svc");
        const toggle=()=>{ state.svc.selected = state.svc.selected===fid ? ALL : fid; render(); };
        el.onclick=toggle;
        el.onkeydown=(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); } };
      });
      // Ordenação de colunas (abas svc e mlp)
      panel.querySelectorAll("[data-sort]").forEach(el=>{
        const key=el.getAttribute("data-sort"); const t=el.getAttribute("data-tab");
        el.onclick=()=>{
          const s=state[t];
          if(s.sortKey===key){ s.dir = s.dir==="asc"?"desc":"asc"; }
          else { s.sortKey=key; s.dir = (key==="falhasMomento"||key==="notDelivered"||key==="steamOutMin"||key==="inativas"||key==="totalCarregado"||key==="rotas")?"desc":"asc"; }
          render();
        };
      });
      // Ordenação por clique na coluna da Abertura por XPT (aba NEX)
      panel.querySelectorAll("[data-sort-xpt]").forEach(el=>{
        const key=el.getAttribute("data-sort-xpt");
        el.onclick=()=>{
          const s=state.nex;
          if(s.xptSort===key){ s.xptDir = s.xptDir==="asc"?"desc":"asc"; }
          else { s.xptSort=key; s.xptDir = (key==="xpt"||key==="nexFlag")?"asc":"desc"; }
          render();
        };
      });
      // Expansão rota a rota ao clicar no XPT (aba NEX)
      panel.querySelectorAll("[data-xpt-toggle]").forEach(el=>{
        const key=el.getAttribute("data-xpt-toggle");
        el.onclick=()=>{ state.nex.xptOpen[key]=!state.nex.xptOpen[key]; render(); };
      });
    });
  }

  function showTab(tab){
    activeTab=tab;
    document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected", t.dataset.tab===tab?"true":"false"));
    document.querySelectorAll(".tabpanel").forEach(p=>p.classList.toggle("hidden", p.id!=="tab-"+tab));
    // Abas que dependem da carga assíncrona do DIT são re-renderizadas ao abrir.
    if(tab==="dit"){ document.getElementById("tab-dit").innerHTML=renderDit(); bindControls(); }
    if(tab==="resumo"){ document.getElementById("tab-resumo").innerHTML=renderResumo(); bindControls(); }
  }
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>showTab(t.dataset.tab)));

  async function load(){
    const btn=document.getElementById("refreshBtn"); btn.disabled=true;
    const status=document.getElementById("status");
    try{
      const res=await fetch(CSV_URL,{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const text=await res.text();
      const parsed=Papa.parse(text,{header:true,skipEmptyLines:true});
      const rows=mapRows(parsed.data||[]);
      if(rows.length===0) throw new Error("CSV sem linhas válidas (verifique os SVCs e os nomes das colunas).");
      // Split: rotas do dia (todas as abas) × rotas de dias anteriores sem CLOSE_DATE.
      const now=new Date();
      ALL_ROWS=rows.filter(r=>!isRotaNaoFinalizada(r,now));
      UNFINISHED_ROWS=rows.filter(r=>isRotaNaoFinalizada(r,now));
      GENERATED_AT=new Date();
      document.getElementById("updatedAt").textContent=GENERATED_AT.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      status.classList.add("hidden");
      document.getElementById("tab-"+activeTab).classList.remove("hidden");
      render();
      loadDit(); // base de DIT D0 (assíncrona, não bloqueia as demais abas)
    }catch(err){
      status.classList.remove("hidden"); status.className="errbox";
      status.textContent="Falha ao carregar os dados: "+err.message+". Verifique se a planilha continua publicada.";
      document.querySelectorAll(".tabpanel").forEach(p=>p.classList.add("hidden"));
    }finally{ btn.disabled=false; }
  }
  document.getElementById("refreshBtn").addEventListener("click",load);
  setInterval(load, REFRESH_MS);
  load();
  </script>
</body>
</html>
